<head>

    <!-- Fonts applied from Design System -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono&family=DM+Sans:ital,wght@0,400;0,500;1,400&family=Space+Grotesk:wght@500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

    <!-- Tailwind CSS for rapid styling matching the design tokens -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bg: '#0E0E10',
                        surface: '#1A1A1E',
                        surfaceHover: '#242428',
                        border: '#2A2A2E',
                        accent: '#FC632B',
                        textPrimary: '#F2F2F3',
                        textSecondary: '#9B9BA4',
                        textTertiary: '#6B6B72',
                        signalAttention: '#FF4949',
                        signalTrack: '#56DAB0',
                        signalModerate: '#FFB349',
                        signalProgress: '#7B8CDE',
                        systemError: '#E1454D',
                        systemWarning: '#FFDB4A',
                        systemSuccess: '#87F064',
                        systemInformative: '#4DCBFD'
                    },
                    fontFamily: {
                        heading: ['"Space Grotesk"', 'sans-serif'],
                        sans: ['"DM Sans"', 'sans-serif'],
                        mono: ['"DM Mono"', 'monospace'],
                    }
                }
            }
        }
    </script>

    <style>
        body { 
            background-color: #0E0E10; 
            color: #F2F2F3;
            margin: 0; 
            overflow-x: hidden;
            scrollbar-width: thin;
            scrollbar-color: #2A2A2E transparent;
        }
        
        body::-webkit-scrollbar { width: 8px; }
        body::-webkit-scrollbar-track { background: transparent; }
        body::-webkit-scrollbar-thumb { background: #2A2A2E; border-radius: 10px; }
        body::-webkit-scrollbar-thumb:hover { background: #FC632B; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .font-heading { font-family: 'Space Grotesk', sans-serif; letter-spacing: -0.01em; }
        .font-sans { font-family: 'DM Sans', sans-serif; line-height: 1.6; }
        .font-mono { font-family: 'DM Mono', monospace; line-height: 1.0; letter-spacing: 0.1em; text-transform: uppercase; }

        .animate-in { animation: fadeIn 500ms cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        html { scroll-behavior: smooth; }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        [contenteditable][data-placeholder]:empty:not(:focus)::before {
            content: attr(data-placeholder);
            color: #6B6B72;
            pointer-events: none;
            cursor: text;
        }

        /* Autofill override for dark theme */
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 30px #242428 inset !important;
            -webkit-text-fill-color: #F2F2F3 !important;
            transition: background-color 5000s ease-in-out 0s;
        }

        /* Editor Prose Styles */
        .prose-editor { outline: none; }
        .prose-editor h1 { font-family: 'Space Grotesk', sans-serif; font-size: 32px; color: #F2F2F3; margin-bottom: 24px; margin-top: 0; font-weight: 500; letter-spacing: -0.01em; }
        .prose-editor h2 { font-family: 'Space Grotesk', sans-serif; font-size: 20px; color: #F2F2F3; margin-bottom: 16px; margin-top: 40px; font-weight: 500; letter-spacing: -0.01em; }
        .prose-editor p { color: #9B9BA4; font-size: 15px; line-height: 1.8; margin-bottom: 16px; margin-top: 0; min-height: 1.5em; }
        .prose-editor b, .prose-editor strong { color: #F2F2F3; font-weight: 600; }
        .prose-editor i, .prose-editor em { font-style: italic; }
        .prose-editor u { text-decoration: underline; text-decoration-color: #6B6B72; }
        .prose-editor ul { list-style-type: disc; padding-left: 24px; color: #9B9BA4; font-size: 15px; line-height: 1.8; margin-bottom: 16px; }
        .prose-editor ol { list-style-type: decimal; padding-left: 24px; color: #9B9BA4; font-size: 15px; line-height: 1.8; margin-bottom: 16px; }
        .prose-editor blockquote { border-left: 3px solid #FC632B; padding-left: 16px; margin-left: 0; color: #F2F2F3; font-style: italic; margin-bottom: 16px; }
        .prose-editor a { color: #4DCBFD; text-decoration: underline; }
        .prose-editor *:first-child { margin-top: 0; }
    </style>
</head>

            const videoRef = useRef(null);

            useEffect(() => {
                const video = videoRef.current;
                if (!video) return;

                video.defaultMuted = true;
                video.muted = true;

                if (window.Hls && window.Hls.isSupported()) {
                    const hls = new window.Hls();
                    hls.loadSource(src);
                    hls.attachMedia(video);
                    hls.on(window.Hls.Events.MANIFEST_PARSED, function() {
                        video.play().catch(e => console.log("Play failed:", e));
                    });
                    return () => {
                        hls.destroy();
                    };
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = src;
                    video.addEventListener('loadedmetadata', function() {
                        video.play().catch(e => console.log("Play failed:", e));
                    });
                }

                                    <span className="font-mono text-[11px] text-[#6B6B72] uppercase">7 days</span>
                                    <button onClick={() => onPostDetail(6)} className="font-sans font-medium text-[13px] text-[#FC632B] hover:underline">Review signal &rarr;</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- EDITOR VIEW (With Sidebar) ---
        const EditorHome = ({ onBack, onPublish }) => {
            const [isSidebarOpen, setIsSidebarOpen] = useState(true);
            const [activeFormats, setActiveFormats] = useState({
                h1: false, h2: false, bold: false, italic: false, underline: false, blockquote: false, ul: false, ol: false
            });

            const updateFormatState = () => {
                const selection = document.getSelection();
                if (selection.rangeCount > 0) {
                    const activeEl = selection.anchorNode?.parentElement;
                    if (activeEl && activeEl.closest('.prose-editor')) {
                        const blockFormat = document.queryCommandValue('formatBlock').toLowerCase();
                        setActiveFormats({
                            h1: blockFormat === 'h1',
                            h2: blockFormat === 'h2',
                            blockquote: blockFormat === 'blockquote',
                            bold: document.queryCommandState('bold'),
                            italic: document.queryCommandState('italic'),
                            underline: document.queryCommandState('underline'),
                            ul: document.queryCommandState('insertUnorderedList'),
                            ol: document.queryCommandState('insertOrderedList'),
                        });
                    }
                }
            };

            useEffect(() => {
                document.addEventListener('selectionchange', updateFormatState);
                return () => document.removeEventListener('selectionchange', updateFormatState);
            }, []);

            const handleFormat = (command, value = null) => {
                document.execCommand(command, false, value);
                updateFormatState();
            };

            const toggleBlock = (tag) => {
                const currentBlock = document.queryCommandValue('formatBlock').toLowerCase();
                if (currentBlock === tag.toLowerCase()) {
                    document.execCommand('formatBlock', false, 'p');
                } else {
                    document.execCommand('formatBlock', false, tag);
                }
                updateFormatState();
            };

            const handleLink = () => {
                const url = prompt('Enter link URL:');
                if (url) {
                    handleFormat('createLink', url);
                }
            };

            const getBtnClass = (isActive) => {
                return `w-8 h-8 flex items-center justify-center rounded-[6px] transition-colors ${isActive ? 'bg-[#242428] text-[#F2F2F3] border border-[#FC632B]/50' : 'text-[#9B9BA4] hover:bg-[#242428] hover:text-[#F2F2F3]'}`;
            };

            return (
                <div className="w-full max-w-[1200px] mx-auto animate-in fade-in h-[calc(100vh-120px)] flex flex-col p-4 md:p-8 pb-4">
                    {/* Header Toolbar */}
                    <div className="flex justify-between items-center mb-6 shrink-0">
                        <button onClick={onBack} className="text-[#6B6B72] flex items-center gap-1 hover:text-white transition-colors">
                            <Icon name="chevron_left" size={18} /> Save as draft
                        </button>
                        <div className="flex items-center gap-4">
                            <span className="text-[#6B6B72] font-mono text-[11px] uppercase tracking-wider">Autosaved just now</span>
                            <Button variant="primary" className="py-2 px-6" onClick={onPublish}>Publish</Button>
                        </div>
                    </div>

                    {/* Main Layout Area */}
                    <div className="flex gap-6 flex-1 min-h-0">
                        {/* Left: Document Editor Area */}
                        <div className="bg-[#1A1A1E] border border-[#2A2A2E] rounded-[16px] shadow-inner flex-1 flex flex-col overflow-hidden">
                            {/* Text Editor Tools Toolbar */}
                            <div className="flex items-center gap-1 border-b border-[#2A2A2E] p-2 bg-[#1A1A1E] shrink-0 overflow-x-auto no-scrollbar">
                                <button onMouseDown={(e) => { e.preventDefault(); toggleBlock('H1'); }} className={getBtnClass(activeFormats.h1)}><Icon name="format_h1" size={18} /></button>
                                <button onMouseDown={(e) => { e.preventDefault(); toggleBlock('H2'); }} className={getBtnClass(activeFormats.h2)}><Icon name="format_h2" size={18} /></button>
                                <div className="w-px h-4 bg-[#2A2A2E] mx-1"></div>
                                <button onMouseDown={(e) => { e.preventDefault(); handleFormat('bold'); }} className={getBtnClass(activeFormats.bold)}><Icon name="format_bold" size={18} /></button>
                                <button onMouseDown={(e) => { e.preventDefault(); handleFormat('italic'); }} className={getBtnClass(activeFormats.italic)}><Icon name="format_italic" size={18} /></button>
                                <button onMouseDown={(e) => { e.preventDefault(); handleFormat('underline'); }} className={getBtnClass(activeFormats.underline)}><Icon name="format_underlined" size={18} /></button>
                                <div className="w-px h-4 bg-[#2A2A2E] mx-1"></div>
                                <button onMouseDown={(e) => { e.preventDefault(); handleFormat('insertUnorderedList'); }} className={getBtnClass(activeFormats.ul)}><Icon name="format_list_bulleted" size={18} /></button>
                                <button onMouseDown={(e) => { e.preventDefault(); handleFormat('insertOrderedList'); }} className={getBtnClass(activeFormats.ol)}><Icon name="format_list_numbered" size={18} /></button>
                                <div className="w-px h-4 bg-[#2A2A2E] mx-1"></div>
                                <button onMouseDown={(e) => { e.preventDefault(); toggleBlock('BLOCKQUOTE'); }} className={getBtnClass(activeFormats.blockquote)}><Icon name="format_quote" size={18} /></button>
                                <button onMouseDown={(e) => { e.preventDefault(); handleLink(); }} className={getBtnClass(false)}><Icon name="link" size={18} /></button>
                            </div>

                            {/* Writing Canvas - Unified into a single contentEditable div */}
                            <div className="p-[48px] pt-[32px] overflow-y-auto flex-1">
                                <div 
                                    className="prose-editor min-h-full" 
                                    contentEditable 
                                    suppressContentEditableWarning
                                    data-placeholder="Start typing here..."
                                >
                                    <h1>The complete guide to B2B email strategy</h1>
                                    <h2>Introduction</h2>
                                    <p>Email marketing in the B2B space is no longer just about sending newsletters. It's about highly targeted, automated sequences that drive pipeline.</p>
                                    <p><br/></p>
                                </div>
                            </div>
                        </div>

                        {/* Right: Persistant Insight Panel */}
                        {isSidebarOpen ? (
                            <div className="w-[320px] shrink-0 flex flex-col gap-2 animate-in fade-in slide-in-from-right-4 duration-300">
                                {/* Expand/Collapse Toggle - Outside Panel */}
                                <div className="w-full flex justify-end">
                                    <div className="w-[64px] flex justify-center">
                                        <button onClick={() => setIsSidebarOpen(false)} className="text-[#6B6B72] hover:text-[#F2F2F3] transition-colors pb-2 pt-1">
                                            <Icon name="last_page" size={20} />
                                        </button>
                                    </div>
                                </div>

                                {/* Main Panel Wrapper */}
                                <div className="bg-[#1A1A1E] border border-[#2A2A2E] rounded-[16px] flex flex-col flex-1 min-h-0 overflow-hidden">
                                    {/* Panel Header */}
                                    <div className="p-[16px] border-b border-[#2A2A2E] shrink-0 bg-[#1A1A1E] flex gap-3 items-center">
                                        <div className="w-8 h-8 rounded-lg bg-[#242428] flex items-center justify-center shrink-0 border border-[#2A2A2E]">
                                            <Icon name="bar_chart" size={18} className="text-[#FC632B]" />
                                        </div>
                                        <div>
                                            <h3 className="text-[13px] font-medium text-[#F2F2F3] font-sans line-clamp-1">Insight for: Introduction</h3>
                                            <p className="text-[11px] text-[#6B6B72] font-sans mt-0.5 leading-[1.4]">Triggered after completing section</p>
                                        </div>
                                    </div>

                                    {/* Dynamic Cards List */}
                                    <div className="flex flex-col gap-[16px] overflow-y-auto p-[16px] no-scrollbar">
                                        {/* Card 1 - Risk */}
                                        <div className="bg-[#FFDB4A]/10 border border-[#FFDB4A]/30 rounded-[12px] p-[16px]">
                                            <div className="flex items-center gap-2 text-[#FFDB4A] mb-2">
                                                <Icon name="warning" size={16} />
                                                <span className="text-[13px] font-medium font-sans">Drop-off risk</span>
                                            </div>
                                            <p className="text-[13px] text-[#F2F2F3] font-sans leading-[1.6]">
                                                High exit rates on generic tool feature lists. Keep focus on strategy implementation.
                                            </p>
                                        </div>

                                        {/* Card 2 - Audience */}
                                        <div className="bg-[#56DAB0]/10 border border-[#56DAB0]/30 rounded-[12px] p-[16px]">
                                            <div className="flex items-center gap-2 text-[#56DAB0] mb-2">
                                                <Icon name="group" size={16} />
                                                <span className="text-[13px] font-medium font-sans">What your audience responds to</span>
                                            </div>
                                            <p className="text-[13px] text-[#F2F2F3] font-sans leading-[1.6]">
                                                Readers consistently clicked through to the advanced segmentation templates in past intro sections.
                                            </p>
                                        </div>

                                        {/* Card 3 - Suggestion */}
                                        <div className="bg-[#4DCBFD]/10 border border-[#4DCBFD]/30 rounded-[12px] p-[16px]">
                                            <div className="flex items-center gap-2 text-[#4DCBFD] mb-2">
                                                <Icon name="edit" size={16} />
                                                <span className="text-[13px] font-medium font-sans">Suggested adjustment</span>
                                            </div>
                                            <p className="text-[13px] text-[#F2F2F3] font-sans leading-[1.6]">
                                                Move the CRM integration mention to the first paragraph to hook high-intent readers immediately.
                                            </p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            /* Collapsed State Panel */
                            <div className="w-[64px] shrink-0 flex flex-col gap-2 animate-in fade-in slide-in-from-right-4 duration-300">
                                {/* Toggle Button - Outside panel */}
                                <div className="w-full flex justify-center">
                                    <button onClick={() => setIsSidebarOpen(true)} className="text-[#6B6B72] hover:text-[#F2F2F3] transition-colors pb-2 pt-1">
                                        <Icon name="first_page" size={20} />
                                    </button>
                                </div>
                                
                                {/* Main Panel Wrapper */}
                                <div className="bg-[#1A1A1E] border border-[#2A2A2E] rounded-[16px] flex flex-col flex-1 min-h-0 overflow-hidden">
                                    {/* Header Icon Area */}
                                    <div className="p-[16px] border-b border-[#2A2A2E] flex justify-center shrink-0 bg-[#1A1A1E]">
                                        <div className="relative cursor-pointer group" onClick={() => setIsSidebarOpen(true)}>
                                            <div className="w-8 h-8 rounded-lg bg-[#242428] border border-[#2A2A2E] flex items-center justify-center group-hover:border-[#FC632B]/50 transition-colors">
                                                <Icon name="bar_chart" size={18} className="text-[#FC632B]" />
                                            </div>
                                            {/* Unread indicator dot */}
                                            <div className="absolute -top-1 -right-1 w-[10px] h-[10px] bg-[#FC632B] rounded-full border-[2px] border-[#1A1A1E]"></div>
                                        </div>
                                    </div>
                                    
                                    {/* Signal Icons */}
                                    <div className="flex flex-col gap-[24px] items-center p-[16px] pt-[24px] opacity-60 overflow-y-auto no-scrollbar">
                                        <Icon name="warning" size={20} className="text-[#FFDB4A]" />
                                        <Icon name="group" size={20} className="text-[#56DAB0]" />
                                        <Icon name="edit" size={20} className="text-[#4DCBFD]" />
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // --- CONTENT CARD ---
        const ContentCard = ({ card, onClick }) => {
            const [part1, part2] = card.caption.split(' · ');

            return (
                <div 
                    className="p-5 rounded-xl bg-[#1A1A1E] border border-[#2A2A2E] hover:bg-[#242428] hover:border-[#FC632B]/50 transition-all cursor-pointer flex flex-col group min-h-[110px] h-full"
                    onClick={() => onClick(card)}
                >
                    <div className="flex justify-between items-start gap-2">
                        <Badge label={card.badge} />
                        <span className="text-[10px] font-mono text-[#6B6B72] whitespace-nowrap">{card.published}</span>
                    </div>
                    
                    <h3 className="font-heading font-medium text-[15px] line-clamp-2 leading-snug text-[#F2F2F3] mt-3">
                        {card.title}
                    </h3>

                    <div className="w-full h-px bg-[#2A2A2E] mt-4 mb-3"></div>

                    <div className="flex flex-col gap-2 mt-auto">
                        <div className="flex items-center gap-1.5 text-[13px] text-[#F2F2F3] font-sans">
                            <Icon name="bar_chart" size={14} className="text-[#6B6B72] shrink-0" />
                            <span className="truncate">{part1}</span>
                        </div>
                        {part2 && (
                            <div className="flex items-center gap-1.5 text-[13px] text-[#F2F2F3] font-sans">
                                <Icon name="lightbulb" size={14} className="text-[#6B6B72] shrink-0" />
                                <span className="truncate">{part2}</span>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const ProduceHome = ({ onOpenBrief }) => {
            const [selectedCard, setSelectedCard] = useState(null);
            const [filter, setFilter] = useState('all');
            const [sortOrder, setSortOrder] = useState('newest');
            const [showToast, setShowToast] = useState(false);
            const [dismissedCard, setDismissedCard] = useState(null);

            useEffect(() => {
                let timer;
                if (showToast) {
                    timer = setTimeout(() => {
                        setShowToast(false);
                        setDismissedCard(null);
                    }, 4000);
                }
                return () => clearTimeout(timer);
            }, [showToast]);

            const handleDismiss = (card) => {
                setDismissedCard(card);
                setSelectedCard(null);
                setShowToast(true);
            };

            const handleUndo = () => {
                setShowToast(false);
                setSelectedCard(dismissedCard);
                setDismissedCard(null);
            };

            useEffect(() => {
                if (selectedCard) {
                    document.body.style.overflow = 'hidden';
                } else {
                    document.body.style.overflow = 'unset';
                }
                return () => {
                    document.body.style.overflow = 'unset';
                };
            }, [selectedCard]);

            const getCount = (badgeType) => {
                if (badgeType === 'all') return CONTENT_CARDS.length;
                return CONTENT_CARDS.filter(card => card.badge.toLowerCase() === badgeType.toLowerCase()).length;
            };

            const filteredCards = CONTENT_CARDS
                .filter(card => {
                    if (filter === 'all') return true;
                    return card.badge.toLowerCase() === filter.toLowerCase();
                })
                .sort((a, b) => {
                    return sortOrder === 'newest' ? b.timestamp - a.timestamp : a.timestamp - b.timestamp;
                });

            const filters = [
                { id: 'all', label: 'All' },
                { id: 'needs attention', label: 'Needs attention' },
                { id: 'on track', label: 'On track' },
                { id: 'no data', label: 'No data' },
                { id: 'draft', label: 'Draft' }
            ];

            return (
                <div className="animate-in fade-in duration-500 pb-20 px-4 md:px-8 relative pt-8">
                    {/* HERO SECTION */}
                    <div className="relative z-0 w-[100vw] left-[50%] right-[50%] -ml-[50vw] -mr-[50vw] h-[280px] -mt-8 mb-10 flex flex-col items-center justify-center text-center overflow-hidden bg-[#0E0E10]">
                        <HlsVideoBackground 
                            src="https://stream.mux.com/NcU3HlHeF7CUL86azTTzpy3Tlb00d6iF3BmCdFslMJYM.m3u8"
                            className="absolute inset-0 w-full h-full object-cover opacity-[0.65] z-0"
                            style={{ filter: 'contrast(120%) brightness(45%)' }}
                        />
                        <div 
                            className="absolute inset-0 z-0 pointer-events-none opacity-[0.35] mix-blend-overlay"
                            style={{ backgroundImage: `url("data:image/svg+xml,%3Csvg viewBox='0 0 250 250' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='highResNoise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23highResNoise)'/%3E%3C/svg%3E")` }}
                        ></div>
                        <div className="absolute inset-0 z-0 pointer-events-none" style={{ background: 'linear-gradient(to top, #0E0E10 0%, transparent 25%)' }}></div>
                        
                        <div className="relative z-10 px-4 mt-6">
                            <h1 className="text-[32px] md:text-[40px] font-heading text-[#F2F2F3] mb-3">Welcome back, Alice!</h1>
                            <p className="text-[15px] md:text-[16px] font-sans text-[#9B9BA4]">Start taking actions that reflect on your performance</p>
                        </div>
                    </div>

                    <div className="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-10">
                        <h1 className="text-3xl font-heading text-[#F2F2F3]">Production</h1>
                        <Button onClick={() => onOpenBrief('new')}>
                            <Icon name="add" size={18} /> Create new
                        </Button>
                    </div>

                    <div className="mb-10">
                        <h2 className="text-xl font-heading mb-4 text-[#F2F2F3]">Briefs ready to write</h2>
                        <div 
                            className="bg-[#1A1A1E] border border-[#2A2A2E] p-5 rounded-xl flex items-center justify-between cursor-pointer hover:bg-[#242428] transition-all group"
                            onClick={() => onOpenBrief('ready_to_write')}
                        >
                            <div className="flex items-center gap-5">
                                <div className="w-12 h-12 bg-[#FC632B]/10 rounded-xl flex items-center justify-center text-[#FC632B] group-hover:scale-105 transition-transform"><Icon name="description" size={24} /></div>
                                <div>
                                    <h3 className="font-medium text-[#F2F2F3]">Refresh - B2B email strategy guide</h3>
                                    <p className="text-xs text-[#6B6B72] mt-1">Assigned by Sarah K. • Due Nov 22</p>
                                </div>
                            </div>
                            <div className="flex items-center gap-2 text-[#FC632B] font-medium text-sm">Open brief <Icon name="chevron_right" size={16} /></div>
                        </div>
                    </div>

                    <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6 border-b border-[#2A2A2E] pb-4">
                        <div className="flex items-center gap-2 overflow-x-auto no-scrollbar">
                            {filters.map(f => (
                                <button
                                    key={f.id}
                                    onClick={() => setFilter(f.id)}
                                    className={`px-4 py-1.5 rounded-full text-xs font-medium transition-all whitespace-nowrap flex items-center gap-2 group ${filter === f.id ? 'bg-[#242428] text-[#F2F2F3]' : 'text-[#6B6B72] hover:text-[#F2F2F3]'}`}
                                >
                                    {f.label}
                                    <span className={`px-1.5 py-0.5 rounded-md text-[10px] font-mono transition-colors ${filter === f.id ? 'bg-[#FC632B] text-white' : 'bg-[#2A2A2E] text-[#6B6B72] group-hover:text-[#9B9BA4]'}`}>
                                        {getCount(f.id)}
                                    </span>
                                </button>
                            ))}
                        </div>
                        <button 
                            onClick={() => setSortOrder(sortOrder === 'newest' ? 'oldest' : 'newest')}
                            className="flex items-center gap-2 text-xs font-mono text-[#6B6B72] hover:text-[#F2F2F3] transition-colors"
                        >
                            <Icon name="swap_vert" size={16} />
                            SORT: {sortOrder.toUpperCase()}
                        </button>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                        {filteredCards.map(card => (
                            <ContentCard 
                                key={card.id} 
                                card={card} 
                                onClick={(c) => setSelectedCard(c)}
                            />
                        ))}
                    </div>

                    {/* Produce View Detail Modal */}
                    {selectedCard && ReactDOM.createPortal(
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 sm:p-6 overflow-hidden">
                            <div 
                                className="absolute inset-0 bg-black/60 backdrop-blur-sm transition-opacity" 
                                onClick={() => setSelectedCard(null)}
                            ></div>
                            <div className="bg-[#1A1A1E] border border-[#2A2A2E] rounded-2xl w-full max-w-2xl z-10 animate-in fade-in zoom-in-95 duration-200 overflow-hidden flex flex-col shadow-2xl">
                                
                                <div className="p-6 border-b border-[#2A2A2E] flex justify-between items-start bg-[#1A1A1E]">
                                    <div>
                                        <div className="w-fit">
                                            <Badge label={selectedCard.badge} />
                                        </div>
                                        <h2 className="text-xl sm:text-2xl font-heading text-[#F2F2F3] mt-4">{selectedCard.title}</h2>
                                        <div className="text-xs font-mono text-[#6B6B72] mt-2">PUBLISHED: {selectedCard.published}</div>
                                    </div>
                                    <button 
                                        onClick={() => setSelectedCard(null)} 
                                        className="text-[#6B6B72] hover:text-[#F2F2F3] transition-colors p-1"
                                    >
                                        <Icon name="close" size={24} />
                                    </button>
                                </div>

                                <div className="p-6 flex flex-col gap-6 overflow-hidden">
                                    <div className="grid grid-cols-2 gap-6 p-5 rounded-xl bg-[#242428]/40 border border-[#2A2A2E]">
                                        <div className="flex flex-col gap-2">
                                            <div className="flex items-center gap-1.5 text-[#6B6B72]"><Icon name="subject" size={16} /> <span className="text-xs font-mono uppercase tracking-wider">Topic</span></div>
                                            <div className="text-sm text-[#F2F2F3] font-medium leading-snug">{selectedCard.angle}</div>
                                        </div>
                                        <div className="flex flex-col gap-2">
                                            <div className="flex items-center gap-1.5 text-[#6B6B72]"><Icon name="key" size={16} /> <span className="text-xs font-mono uppercase tracking-wider">Keyword</span></div>
                                            <div className="text-sm text-[#F2F2F3] font-medium leading-snug">{selectedCard.keyword}</div>
                                        </div>
                                        <div className="flex flex-col gap-2">
                                            <div className="flex items-center gap-1.5 text-[#6B6B72]"><Icon name="group" size={16} /> <span className="text-xs font-mono uppercase tracking-wider">Audience</span></div>
                                            <div className="text-sm text-[#F2F2F3] font-medium leading-snug">{selectedCard.id % 2 === 0 ? 'Marketing Leads' : 'SaaS Founders'}</div>
                                        </div>
                                        <div className="flex flex-col gap-2">
                                            <div className="flex items-center gap-1.5 text-[#6B6B72]"><Icon name="format_list_numbered" size={16} /> <span className="text-xs font-mono uppercase tracking-wider">Word count</span></div>
                                            <div className="text-sm text-[#F2F2F3] font-medium leading-snug">{selectedCard.stats.split(' ')[0]} words</div>
                                        </div>
                                    </div>

                                    <div className="p-5 rounded-xl bg-[#4DCBFD]/10 border border-[#4DCBFD]/30 flex gap-4 items-start">
                                        <Icon name="lightbulb" size={24} className="text-[#4DCBFD] shrink-0" />
                                        <div className="flex-1">
                                            <div className="text-xs font-mono uppercase tracking-widest text-[#4DCBFD] mb-2 font-medium">AI Signal</div>
                                            <p className="text-sm text-[#F2F2F3] leading-relaxed">
                                                {selectedCard.context}. This presents an immediate opportunity to update the <strong>{selectedCard.keyword}</strong> section and reclaim search visibility based on current trends.
                                            </p>
                                        </div>
                                    </div>
                                </div>

                                <div className="p-6 border-t border-[#2A2A2E] flex flex-col sm:flex-row items-center justify-between gap-4 bg-[#242428]/30">
                                    <a 
                                        href={selectedCard.url} 
                                        target="_blank" 
                                        rel="noopener noreferrer"
                                        className="text-sm font-medium text-[#9B9BA4] hover:text-[#4DCBFD] transition-colors flex items-center gap-1.5 w-full sm:w-auto justify-center shrink-0"
                                    >

                        type={type} 
                        value={value} 
                        onChange={onChange} 
                        className="bg-[#242428] border border-[#2A2A2E] rounded-[8px] p-[10px] px-[12px] font-sans text-[14px] text-[#F2F2F3] focus:outline-none focus:border-[#FC632B]/50 transition-colors w-full"
                    />
                </div>
            );

            const PasswordField = ({ label, value, onChange, show, onToggleShow }) => (
                <div className="flex flex-col">
                    <label className="font-mono text-[10px] text-[#6B6B72] uppercase tracking-[0.1em] mb-[6px]">{label}</label>
                    <div className="relative">
                        <input 
                            type={show ? "text" : "password"} 
                            value={value} 
                            onChange={onChange} 
                            className="bg-[#242428] border border-[#2A2A2E] rounded-[8px] p-[10px] pl-[12px] pr-[36px] font-sans text-[14px] text-[#F2F2F3] focus:outline-none focus:border-[#FC632B]/50 transition-colors w-full"
                        />
                        <Icon 
                            name={show ? "visibility_off" : "visibility"} 
                            size={16} 
                            onClick={onToggleShow}
                            className="absolute right-[12px] top-1/2 -translate-y-1/2 text-[#6B6B72] hover:text-[#9B9BA4] cursor-pointer transition-colors" 
                        />
                    </div>
                </div>
            );

            const Toggle = ({ checked, onChange }) => (
                <button 
                    type="button"
                    onClick={onChange}
                    className={`w-[36px] h-[20px] rounded-full relative transition-colors duration-200 focus:outline-none flex items-center px-[2px] shrink-0 ${checked ? 'bg-[#FC632B]' : 'bg-[#2A2A2E]'}`}
                >
                    <div className={`w-[16px] h-[16px] bg-white rounded-full transition-transform duration-200 ${checked ? 'translate-x-[16px]' : 'translate-x-0'}`} />
                </button>
            );

            return (
                <div className="w-full max-w-[1100px] mx-auto pt-[40px] pb-[80px] animate-in fade-in h-full">
                    <h1 className="font-heading text-[32px] text-[#F2F2F3] mb-[40px]">Settings</h1>
                    
                    <div className="flex items-start">
                        {/* LEFT COLUMN - NAV */}
                        <div className="w-[240px] shrink-0 border-r border-[#2A2A2E] pr-[32px] flex flex-col sticky top-[104px]" style={{ height: 'calc(100vh - 144px)' }}>
                            {/* User Identity Row */}
                            <div className="flex items-center gap-[10px] mb-[28px]">
                                <div className="w-[28px] h-[28px] rounded-full bg-[#242428] border border-[#2A2A2E] flex items-center justify-center overflow-hidden shrink-0">
                                    <span className="font-sans font-medium text-[12px] text-[#9B9BA4]">{role === 'strategist' ? 'S' : 'J'}</span>
                                </div>
                                <span className="font-sans text-[13px] text-[#9B9BA4]">{role === 'strategist' ? 'sarah@company.com' : 'jamie@company.com'}</span>
                            </div>

                            {/* Nav Groups */}
                            {activeNav.map((group, idx) => (
                                <div key={group.id} className={`${idx > 0 ? 'mt-[24px]' : ''}`}>
                                    <div className="flex items-center gap-[8px] mb-[4px]">
                                        <Icon name={group.icon} size={16} className="text-[#6B6B72]" />
                                        <span className="font-mono text-[11px] text-[#6B6B72] uppercase tracking-[0.08em]">{group.label}</span>
                                    </div>
                                    <div className="flex flex-col gap-[4px]">
                                        {group.items.map(item => <NavItem key={item.id} item={item} />)}
                                    </div>
                                </div>
                            ))}

                            {/* Logout Action */}
                            <div className="mt-auto pt-[24px] border-t border-[#2A2A2E]">
                                <button className="flex items-center gap-[8px] font-sans text-[14px] text-[#FF4949] hover:opacity-80 transition-opacity duration-150" onClick={() => setShowLogoutConfirm(true)}>
                                    <Icon name="logout" size={14} /> Logout
                                </button>
                            </div>
                        </div>

                        {/* RIGHT COLUMN - CONTENT */}
                        <div className="flex-1 pl-[56px] flex flex-col">
                            
                            {/* MY ACCOUNT */}
                            {activeSection === 'account' && (
                                <div className="animate-in fade-in duration-300">
                                    <SectionLabel text="ACCOUNT" />
                                    
                                    <div className="flex items-center gap-[16px] mb-[32px]">
                                        <div className="w-[64px] h-[64px] rounded-full bg-[#242428] border border-[#2A2A2E] flex items-center justify-center overflow-hidden shrink-0">
                                            <img src={`https://api.dicebear.com/7.x/avataaars/svg?seed=${role === 'strategist' ? 'Felix' : 'Jamie'}`} alt="avatar" className="w-full h-full object-cover" />
                                        </div>
                                        <div className="flex flex-col gap-1">
                                            <div className="flex items-center gap-2">
                                                <span className="font-sans font-medium text-[16px] text-[#F2F2F3]">{accountForm.name}</span>
                                                <span className="font-mono text-[10px] text-[#9B9BA4] bg-[#2A2A2E] rounded-[6px] px-[8px] py-[2px] uppercase">
                                                    {role === 'strategist' ? 'Strategist' : 'Writer'}
                                                </span>
                                            </div>
                                            <button className="font-sans font-medium text-[13px] text-[#9B9BA4] hover:text-[#F2F2F3] transition-colors duration-150 text-left w-fit">Change avatar</button>
                                        </div>
                                    </div>

                                    <div className="flex flex-col gap-[20px]">
                                        <InputField label="Full name" type="text" value={accountForm.name} onChange={e => setAccountForm({...accountForm, name: e.target.value})} />
                                        <InputField label="Email address" type="email" value={accountForm.email} onChange={e => setAccountForm({...accountForm, email: e.target.value})} />
                                        
                                        <div className="mt-[16px]">
                                            <div className="font-sans font-medium text-[14px] text-[#F2F2F3] mb-[16px]">Change password</div>
                                            <div className="flex flex-col gap-[16px]">
                                                <PasswordField 
                                                    label="Current password" 
                                                    value={passwordForm.current} 
                                                    onChange={e => setPasswordForm({...passwordForm, current: e.target.value})} 
                                                    show={showCurrentPassword}
                                                    onToggleShow={() => setShowCurrentPassword(!showCurrentPassword)}
                                                />
                                                <div className="grid grid-cols-2 gap-[16px]">
                                                    <PasswordField 
                                                        label="New password" 
                                                        value={passwordForm.new} 
                                                        onChange={e => setPasswordForm({...passwordForm, new: e.target.value})} 
                                                        show={showNewPassword}
                                                        onToggleShow={() => setShowNewPassword(!showNewPassword)}
                                                    />
                                                    <PasswordField 
                                                        label="Confirm new password" 
                                                        value={passwordForm.confirm} 
                                                        onChange={e => setPasswordForm({...passwordForm, confirm: e.target.value})} 
                                                        show={showConfirmPassword}
                                                        onToggleShow={() => setShowConfirmPassword(!showConfirmPassword)}
                                                    />
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    {isAccountDirty && (
                                        <div className="flex justify-end gap-[12px] mt-[32px] pt-[20px] border-t border-[#2A2A2E]">
                                            <Button variant="ghost" onClick={handleDiscardAccount}>Cancel</Button>
                                            <Button variant="primary" onClick={handleSaveAccount} disabled={isPasswordPartiallyFilled}>Save</Button>
                                        </div>
                                    )}
                                </div>
                            )}

                            {/* PREFERENCES */}
                            {activeSection === 'preferences' && (
                                <div className="animate-in fade-in duration-300">
                                    <SectionLabel text="PREFERENCES" />
                                    <div className="flex flex-col">
                                        <div className="flex justify-between items-center py-[14px] border-b border-[#2A2A2E]">
                                            <div>
                                                <div className="font-sans font-medium text-[14px] text-[#F2F2F3]">Language</div>
                                                <div className="font-sans text-[12px] text-[#6B6B72] mt-[2px]">Choose your display language</div>
                                            </div>
                                            <div className="relative">
                                                <select 
                                                    value={prefsForm.language}
                                                    onChange={(e) => setPrefsForm({...prefsForm, language: e.target.value})}
                                                    className="appearance-none bg-[#242428] border border-[#2A2A2E] rounded-[8px] py-[8px] pl-[12px] pr-[32px] font-sans text-[14px] text-[#F2F2F3] focus:outline-none focus:border-[#FC632B]/50 transition-colors w-[140px] cursor-pointer"
                                                >
                                                    <option value="English">English</option>
                                                    <option value="Vietnamese">Vietnamese</option>
                                                </select>
                                                <Icon name="expand_more" size={16} className="absolute right-[8px] top-1/2 -translate-y-1/2 text-[#6B6B72] pointer-events-none" />
                                            </div>
                                        </div>

                                        <div className="flex justify-between items-center py-[14px]">
                                            <div>
                                                <div className="font-sans font-medium text-[14px] text-[#F2F2F3]">Appearance</div>
                                                <div className="font-sans text-[12px] text-[#6B6B72] mt-[2px]">Switch between dark and light mode</div>
                                            </div>
                                            <div className="bg-[#242428] border border-[#2A2A2E] rounded-[100px] p-[3px] flex items-center shrink-0">
                                                <button 
                                                    onClick={() => setPrefsForm({...prefsForm, appearance: 'Dark'})}
                                                    className={`transition-all duration-200 ${prefsForm.appearance === 'Dark' ? 'bg-[#1A1A1E] text-[#F2F2F3] font-medium shadow-sm border border-[#2A2A2E]' : 'bg-transparent text-[#6B6B72] font-normal hover:text-[#9B9BA4] border border-transparent'} rounded-[100px] px-[16px] py-[5px] text-[13px] font-sans`}
                                                >Dark</button>
                                                <button 
                                                    onClick={() => setPrefsForm({...prefsForm, appearance: 'Light'})}
                                                    className={`transition-all duration-200 ${prefsForm.appearance === 'Light' ? 'bg-[#1A1A1E] text-[#F2F2F3] font-medium shadow-sm border border-[#2A2A2E]' : 'bg-transparent text-[#6B6B72] font-normal hover:text-[#9B9BA4] border border-transparent'} rounded-[100px] px-[16px] py-[5px] text-[13px] font-sans`}
                                                >Light</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* NOTIFICATIONS */}
                            {activeSection === 'notifications' && (
                                <div className="animate-in fade-in duration-300">
                                    <SectionLabel text="NOTIFICATIONS" />
                                    <div className="flex flex-col">
                                        {role === 'writer' ? (
                                            <>
                                                <div className="flex justify-between items-center py-[14px] border-b border-[#2A2A2E]">
                                                    <div>
                                                        <div className="font-sans font-medium text-[14px] text-[#F2F2F3]">Brief assigned</div>
                                                        <div className="font-sans text-[12px] text-[#6B6B72] mt-[2px]">When a strategist sends you a new brief</div>
                                                    </div>
                                                    <Toggle checked={notifWriter.briefAssigned} onChange={() => setNotifWriter({...notifWriter, briefAssigned: !notifWriter.briefAssigned})} />
                                                </div>
                                                <div className="flex justify-between items-center py-[14px] border-b border-[#2A2A2E]">
                                                    <div>
                                                        <div className="font-sans font-medium text-[14px] text-[#F2F2F3]">Published confirmation</div>
                                                        <div className="font-sans text-[12px] text-[#6B6B72] mt-[2px]">When your post goes live and tracking starts</div>
                                                    </div>
                                                    <Toggle checked={notifWriter.publishedConfirmation} onChange={() => setNotifWriter({...notifWriter, publishedConfirmation: !notifWriter.publishedConfirmation})} />
                                                </div>
                                                <div className="flex justify-between items-center py-[14px]">
                                                    <div>
                                                        <div className="font-sans font-medium text-[14px] text-[#F2F2F3]">Signal on your posts</div>
                                                        <div className="font-sans text-[12px] text-[#6B6B72] mt-[2px]">When a post you wrote gets flagged</div>
                                                    </div>
                                                    <Toggle checked={notifWriter.signalOnPosts} onChange={() => setNotifWriter({...notifWriter, signalOnPosts: !notifWriter.signalOnPosts})} />
                                                </div>
                                            </>
                                        ) : (
                                            <>
                                                <div className="flex justify-between items-center py-[14px] border-b border-[#2A2A2E]">
                                                    <div>
                                                        <div className="font-sans font-medium text-[14px] text-[#F2F2F3]">Signal detected</div>
                                                        <div className="font-sans text-[12px] text-[#6B6B72] mt-[2px]">When any tracked post crosses a signal threshold</div>
                                                    </div>
                                                    <Toggle checked={notifStrategist.signalDetected} onChange={() => setNotifStrategist({...notifStrategist, signalDetected: !notifStrategist.signalDetected})} />
                                                </div>
                                                <div className="flex justify-between items-center py-[14px] border-b border-[#2A2A2E]">
                                                    <div>
                                                        <div className="font-sans font-medium text-[14px] text-[#F2F2F3]">Brief opened</div>
                                                        <div className="font-sans text-[12px] text-[#6B6B72] mt-[2px]">When a writer opens a brief you assigned</div>
                                                    </div>
                                                    <Toggle checked={notifStrategist.briefOpened} onChange={() => setNotifStrategist({...notifStrategist, briefOpened: !notifStrategist.briefOpened})} />
                                                </div>
                                                <div className="flex justify-between items-center py-[14px] border-b border-[#2A2A2E]">
                                                    <div>
                                                        <div className="font-sans font-medium text-[14px] text-[#F2F2F3]">Writer published</div>
                                                        <div className="font-sans text-[12px] text-[#6B6B72] mt-[2px]">When a writer publishes a piece</div>
                                                    </div>
                                                    <Toggle checked={notifStrategist.writerPublished} onChange={() => setNotifStrategist({...notifStrategist, writerPublished: !notifStrategist.writerPublished})} />
                                                </div>
                                                <div className="flex justify-between items-center py-[14px]">
                                                    <div>
                                                        <div className="font-sans font-medium text-[14px] text-[#F2F2F3]">Report ready</div>
                                                        <div className="font-sans text-[12px] text-[#6B6B72] mt-[2px]">When a monthly report is auto-generated</div>
                                                    </div>
                                                    <Toggle checked={notifStrategist.reportReady} onChange={() => setNotifStrategist({...notifStrategist, reportReady: !notifStrategist.reportReady})} />
                                                </div>
                                            </>
                                        )}
                                    </div>
                                </div>
                            )}

                            {/* INTEGRATIONS */}
                            {activeSection === 'integrations' && (
                                <div className="animate-in fade-in duration-300">
                                    <SectionLabel text="INTEGRATIONS" />
                                    
                                    <div className="mb-[24px]">
                                        <div className="font-mono text-[10px] text-[#6B6B72] uppercase tracking-[0.08em] mb-[10px]">CONNECTED</div>
                                        <div className="grid grid-cols-1 xl:grid-cols-2 gap-[12px]">
                                            <div className="bg-[#1A1A1E] border border-[#2A2A2E] rounded-[12px] p-[16px] px-[20px] flex justify-between items-center hover:bg-[#242428] transition-colors">
                                                <div className="flex items-center gap-[12px]">
                                                    <div className="w-[40px] h-[40px] rounded-[10px] bg-white flex items-center justify-center shrink-0">
                                                        <img src="https://www.gstatic.com/analytics-suite/header/suite/v2/ic_analytics.svg" alt="GA" className="w-[24px] h-[24px]" />
                                                    </div>
                                                    <div>
                                                        <div className="font-sans font-medium text-[14px] text-[#F2F2F3]">Google Analytics</div>
                                                        <div className="font-sans text-[12px] text-[#6B6B72] mt-[2px]">workspace@company.com</div>
                                                    </div>
                                                </div>
                                                <Button variant="secondary" className="!py-[6px] !px-[12px] !text-[12px]" onClick={() => setAppToDisconnect('Google Analytics')}>Disconnect</Button>
                                            </div>
                                            <div className="bg-[#1A1A1E] border border-[#2A2A2E] rounded-[12px] p-[16px] px-[20px] flex justify-between items-center hover:bg-[#242428] transition-colors">
                                                <div className="flex items-center gap-[12px]">
                                                    <div className="w-[40px] h-[40px] rounded-[10px] bg-white flex items-center justify-center shrink-0">
                                                        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="GSC" className="w-[20px] h-[20px]" />
                                                    </div>
                                                    <div>
                                                        <div className="font-sans font-medium text-[14px] text-[#F2F2F3]">Search Console</div>
                                                        <div className="font-sans text-[12px] text-[#6B6B72] mt-[2px]">company.com</div>
                                                    </div>
                                                </div>
                                                <Button variant="secondary" className="!py-[6px] !px-[12px] !text-[12px]" onClick={() => setAppToDisconnect('Search Console')}>Disconnect</Button>
                                            </div>
                                        </div>
                                    </div>

                                    <div>
                                        <div className="font-mono text-[10px] text-[#6B6B72] uppercase tracking-[0.08em] mb-[10px] mt-[24px]">NOT CONNECTED</div>
                                        <div className="grid grid-cols-1 xl:grid-cols-2 gap-[12px]">
                                            <div className="bg-[#1A1A1E] border border-[#2A2A2E] rounded-[12px] p-[16px] px-[20px] flex justify-between items-center hover:bg-[#242428] transition-colors">
                                                <div className="flex items-center gap-[12px]">
                                                    <div className="w-[40px] h-[40px] rounded-[10px] bg-[#00A1E0] flex items-center justify-center shrink-0">
                                                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" className="w-[24px] h-[24px] text-white">
                                                            <path d="M16.5 7.5C15.8 7.5 15.2 7.7 14.7 8.1C14.3 6.9 13.2 6 11.9 6C10.7 6 9.6 6.8 9.2 7.9C8.8 7.6 8.3 7.5 7.8 7.5C6.1 7.5 4.8 8.8 4.8 10.5C4.8 12.2 6.1 13.5 7.8 13.5H16.5C18.2 13.5 19.5 12.2 19.5 10.5C19.5 8.8 18.2 7.5 16.5 7.5Z" fill="currentColor"/>
                                                        </svg>
                                                    </div>
                                                    <div>
                                                        <div className="font-sans font-medium text-[14px] text-[#F2F2F3]">Salesforce</div>
                                                        <div className="font-sans text-[12px] text-[#6B6B72] mt-[2px]">CRM Integration</div>
                                                    </div>
                                                </div>
                                                <a href="#" className="font-sans font-medium text-[13px] text-[#FC632B] hover:opacity-80 transition-opacity flex items-center gap-1">
                                                    Connect <Icon name="arrow_outward" size={16} />
                                                </a>
                                            </div>
                                        </div>
                                    </div>
                                    <p className="font-sans text-[13px] text-[#6B6B72] mt-[16px]">To connect or remove an integration, contact your admin.</p>
                                </div>
                            )}

                            {/* TEAMSPACE */}
                            {activeSection === 'teamspace' && (
                                <div className="animate-in fade-in duration-300">
                                    <SectionLabel text="TEAMSPACE" />
                                    
                                    <div className="bg-[#1A1A1E] border border-[#2A2A2E] rounded-[16px] p-[24px]">
                                        <div className="flex flex-col md:flex-row md:items-start justify-between gap-[24px]">
                                            <div className="flex flex-col gap-[12px]">
                                                <div className="flex items-center gap-[12px]">
                                                    <h2 className="font-heading text-[24px] text-[#F2F2F3] font-medium leading-none">Content Mavericks</h2>
                                                </div>
                                                <p className="font-sans text-[14px] text-[#9B9BA4] leading-[1.6] max-w-[500px]">
                                                    The primary workspace for the marketing content team. Connect your integrations and invite team members to collaborate on briefs and signals.
                                                </p>
                                            </div>
                                            <button className="flex items-center justify-center gap-2 font-sans font-medium text-[13px] text-[#E1454D] border border-[#E1454D]/50 hover:bg-[#E1454D]/10 rounded-[8px] px-[16px] py-[8px] transition-colors shrink-0">
                                                Leave teamspace
                                            </button>
                                        </div>

                                        <div className="w-full h-px bg-[#2A2A2E] my-[24px]"></div>

                                        <div className="flex flex-col gap-[6px]">
                                            <div className="font-mono text-[10px] text-[#6B6B72] uppercase tracking-[0.1em]">Invite link</div>
                                            <div className="flex items-center gap-[8px]">
                                                <div className="bg-[#242428] border border-[#2A2A2E] rounded-[8px] py-[8px] px-[12px] font-sans text-[13px] text-[#9B9BA4] flex-1 max-w-[400px] truncate">
                                                    https://scribe.ai/invite/t_982hjsdf87
                                                </div>
                                                <button className="w-[36px] h-[36px] rounded-[8px] bg-[#242428] border border-[#2A2A2E] flex items-center justify-center text-[#9B9BA4] hover:text-[#F2F2F3] hover:border-[#FC632B]/50 transition-colors">
                                                    <Icon name="content_copy" size={16} />
                                                </button>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Members Table */}
                                    <div className="mt-[40px]">
                                        <SectionLabel text="MEMBERS" />
                                        <div className="bg-[#1A1A1E] border border-[#2A2A2E] rounded-[12px] overflow-x-auto">
                                            <table className="w-full min-w-[600px] text-left border-collapse">
                                                <thead>
                                                    <tr className="border-b border-[#2A2A2E]">
                                                        <th className="font-mono text-[10px] text-[#6B6B72] uppercase tracking-[0.08em] font-normal py-[14px] px-[20px]">Member</th>
                                                        <th className="font-mono text-[10px] text-[#6B6B72] uppercase tracking-[0.08em] font-normal py-[14px] px-[20px]">Role</th>
                                                        <th className="font-mono text-[10px] text-[#6B6B72] uppercase tracking-[0.08em] font-normal py-[14px] px-[20px]">Email</th>
                                                        <th className="font-mono text-[10px] text-[#6B6B72] uppercase tracking-[0.08em] font-normal py-[14px] px-[20px]">Joined</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    <tr className="border-b border-[#2A2A2E] hover:bg-[#242428]/50 transition-colors">
                                                        <td className="py-[14px] px-[20px]">
                                                            <div className="flex items-center gap-[12px]">
                                                                <div className="w-[28px] h-[28px] rounded-full bg-[#242428] border border-[#2A2A2E] flex items-center justify-center overflow-hidden shrink-0">
                                                                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="avatar" />
                                                                </div>
                                                                <span className="font-sans font-medium text-[13px] text-[#F2F2F3]">Sarah K.</span>
                                                            </div>
                                                        </td>
                                                        <td className="py-[14px] px-[20px]"><span className="font-mono text-[10px] text-[#9B9BA4] bg-[#2A2A2E] rounded-[6px] px-[8px] py-[2px] uppercase">Strategist</span></td>
                                                        <td className="py-[14px] px-[20px]"><span className="font-sans text-[13px] text-[#9B9BA4]">sarah@company.com</span></td>
                                                        <td className="py-[14px] px-[20px]"><span className="font-sans text-[13px] text-[#9B9BA4]">Jun 4, 2023</span></td>
                                                    </tr>
                                                    <tr className="border-b border-[#2A2A2E] hover:bg-[#242428]/50 transition-colors">
                                                        <td className="py-[14px] px-[20px]">
                                                            <div className="flex items-center gap-[12px]">
                                                                <div className="w-[28px] h-[28px] rounded-full bg-[#242428] border border-[#2A2A2E] flex items-center justify-center overflow-hidden shrink-0">
                                                                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Jamie" alt="avatar" />
                                                                </div>
                                                                <span className="font-sans font-medium text-[13px] text-[#F2F2F3]">Jamie D.</span>
                                                            </div>
                                                        </td>
                                                        <td className="py-[14px] px-[20px]"><span className="font-mono text-[10px] text-[#9B9BA4] bg-[#2A2A2E] rounded-[6px] px-[8px] py-[2px] uppercase">Writer</span></td>
                                                        <td className="py-[14px] px-[20px]"><span className="font-sans text-[13px] text-[#9B9BA4]">jamie@company.com</span></td>
                                                        <td className="py-[14px] px-[20px]"><span className="font-sans text-[13px] text-[#9B9BA4]">Oct 12, 2023</span></td>
                                                    </tr>
                                                    <tr className="hover:bg-[#242428]/50 transition-colors">
                                                        <td className="py-[14px] px-[20px]">
                                                            <div className="flex items-center gap-[12px]">
                                                                <div className="w-[28px] h-[28px] rounded-full bg-[#242428] border border-[#2A2A2E] flex items-center justify-center overflow-hidden shrink-0">
                                                                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Alex" alt="avatar" />
                                                                </div>
                                                                <span className="font-sans font-medium text-[13px] text-[#F2F2F3]">Alex T.</span>
                                                            </div>
                                                        </td>
                                                        <td className="py-[14px] px-[20px]"><span className="font-mono text-[10px] text-[#9B9BA4] bg-[#2A2A2E] rounded-[6px] px-[8px] py-[2px] uppercase">Writer</span></td>
                                                        <td className="py-[14px] px-[20px]"><span className="font-sans text-[13px] text-[#9B9BA4]">alex.t@company.com</span></td>
                                                        <td className="py-[14px] px-[20px]"><span className="font-sans text-[13px] text-[#9B9BA4]">Jan 21, 2024</span></td>
                                                    </tr>
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* PLANS */}
                            {activeSection === 'plans' && (
                                <div className="animate-in fade-in duration-300">
                                    <SectionLabel text="PLANS" />
                                    
                                    <div className="bg-[#1A1A1E] border border-[#2A2A2E] rounded-[16px] p-[24px] mb-[32px]">
                                        <div className="w-[40px] h-[40px] rounded-[10px] bg-[#242428] border border-[#2A2A2E] flex items-center justify-center mb-[16px]">
                                            <Icon name="workspace_premium" size={20} className={role === 'writer' ? 'text-[#87F064]' : 'text-[#4DCBFD]'} />
                                        </div>
                                        <div className="flex justify-between items-start gap-[24px]">
                                            <div>
                                                <div className="font-heading text-[20px] text-[#F2F2F3] font-medium leading-none">{role === 'writer' ? 'Free Plan' : 'Growth Plan'}</div>
                                                <div className="font-sans text-[13px] text-[#9B9BA4] mt-[8px]">{role === 'writer' ? 'The perfect plan for early-stage content teams.' : 'Full access to signals, briefs, and team management.'}</div>
                                            </div>
                                            <div className="text-right shrink-0">
                                                <div className="font-heading text-[24px] text-[#F2F2F3] leading-none mb-[4px]">{role === 'writer' ? '$0' : '$29'}</div>
                                                <div className="font-sans text-[12px] text-[#6B6B72]">{role === 'writer' ? 'free forever' : 'per member / monthly'}</div>
                                            </div>
                                        </div>
                                    </div>

                                    <div>
                                        <div className="font-mono text-[10px] text-[#6B6B72] uppercase tracking-[0.08em] mb-[12px]">ROLES AND ACCESS</div>
                                        <div className="flex flex-col">
                                            <div className="grid grid-cols-[100px_1fr] items-center py-[12px] border-b border-[#2A2A2E] gap-[24px]">
                                                <span className="font-sans font-medium text-[14px] text-[#F2F2F3]">Writers</span>
                                                <span className="font-sans text-[13px] text-[#9B9BA4] text-left">Can create and publish content</span>
                                            </div>
                                            <div className="grid grid-cols-[100px_1fr] items-center py-[12px] border-b border-[#2A2A2E] gap-[24px]">
                                                <span className="font-sans font-medium text-[14px] text-[#F2F2F3]">Strategists</span>
                                                <span className="font-sans text-[13px] text-[#9B9BA4] text-left">Can manage signals, briefs, and reports</span>
                                            </div>
                                            <div className="grid grid-cols-[100px_1fr] items-center py-[12px] gap-[24px]">
                                                <span className="font-sans font-medium text-[14px] text-[#F2F2F3]">Admins</span>
                                                <span className="font-sans text-[13px] text-[#9B9BA4] text-left">Can manage members, billing, and workspace settings</span>
                                            </div>
                                        </div>
                                    </div>
                                    <p className="font-sans text-[13px] text-[#6B6B72] mt-[16px]">To upgrade or change your plan, contact your admin.</p>
                                </div>
                            )}

                            {/* SIGNAL THRESHOLDS (Strategist only) */}
                            {activeSection === 'thresholds' && role === 'strategist' && (
                                <div className="animate-in fade-in duration-300">
                                    <SectionLabel text="SIGNAL THRESHOLDS" />
