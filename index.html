<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scribe AI - Design System Prototype</title>
    
    <!-- Fonts applied from Design System -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono&family=DM+Sans:ital,wght@0,400;0,500;1,400&family=Space+Grotesk:wght@500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

    <!-- Tailwind CSS for rapid styling matching the design tokens -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bg: '#0E0E10',
                        surface: '#1A1A1E',
                        surfaceHover: '#242428',
                        border: '#2A2A2E',
                        accent: '#FC632B',
                        textPrimary: '#F2F2F3',
                        textSecondary: '#9B9BA4',
                        textTertiary: '#6B6B72',
                        signalAttention: '#FF4949',
                        signalTrack: '#56DAB0',
                        signalModerate: '#FFB349',
                        signalProgress: '#7B8CDE',
                        systemError: '#E1454D',
                        systemWarning: '#FFDB4A',
                        systemSuccess: '#87F064',
                        systemInformative: '#4DCBFD'
                    },
                    fontFamily: {
                        heading: ['"Space Grotesk"', 'sans-serif'],
                        sans: ['"DM Sans"', 'sans-serif'],
                        mono: ['"DM Mono"', 'monospace'],
                    }
                }
            }
        }
    </script>

    <style>
        body { 
            background-color: #0E0E10; 
            color: #F2F2F3;
            margin: 0; 
            overflow-x: hidden;
            scrollbar-width: thin;
            scrollbar-color: #2A2A2E transparent;
        }
        
        body::-webkit-scrollbar { width: 8px; }
        body::-webkit-scrollbar-track { background: transparent; }
        body::-webkit-scrollbar-thumb { background: #2A2A2E; border-radius: 10px; }
        body::-webkit-scrollbar-thumb:hover { background: #FC632B; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .font-heading { font-family: 'Space Grotesk', sans-serif; letter-spacing: -0.01em; }
        .font-sans { font-family: 'DM Sans', sans-serif; line-height: 1.6; }
        .font-mono { font-family: 'DM Mono', monospace; line-height: 1.0; letter-spacing: 0.1em; text-transform: uppercase; }

        .animate-in { animation: fadeIn 350ms cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        html { scroll-behavior: smooth; }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        [contenteditable][data-placeholder]:empty:not(:focus)::before {
            content: attr(data-placeholder);
            color: #6B6B72;
            pointer-events: none;
            cursor: text;
        }

        /* Editor Prose Styles */
        .prose-editor { outline: none; }
        .prose-editor h1 { font-family: 'Space Grotesk', sans-serif; font-size: 32px; color: #F2F2F3; margin-bottom: 24px; margin-top: 0; font-weight: 500; letter-spacing: -0.01em; }
        .prose-editor h2 { font-family: 'Space Grotesk', sans-serif; font-size: 20px; color: #F2F2F3; margin-bottom: 16px; margin-top: 40px; font-weight: 500; letter-spacing: -0.01em; }
        .prose-editor p { color: #9B9BA4; font-size: 15px; line-height: 1.8; margin-bottom: 16px; margin-top: 0; min-height: 1.5em; }
        .prose-editor b, .prose-editor strong { color: #F2F2F3; font-weight: 600; }
        .prose-editor i, .prose-editor em { font-style: italic; }
        .prose-editor u { text-decoration: underline; text-decoration-color: #6B6B72; }
        .prose-editor ul { list-style-type: disc; padding-left: 24px; color: #9B9BA4; font-size: 15px; line-height: 1.8; margin-bottom: 16px; }
        .prose-editor ol { list-style-type: decimal; padding-left: 24px; color: #9B9BA4; font-size: 15px; line-height: 1.8; margin-bottom: 16px; }
        .prose-editor blockquote { border-left: 3px solid #FC632B; padding-left: 16px; margin-left: 0; color: #F2F2F3; font-style: italic; margin-bottom: 16px; }
        .prose-editor a { color: #4DCBFD; text-decoration: underline; }
        .prose-editor *:first-child { margin-top: 0; }
    </style>
</head>
<body class="font-sans antialiased selection:bg-accent selection:text-white">
    <div id="root"></div>

    <!-- React and Babel CDN for Prototype Functionality -->

                writer: 'Jamie D.', rank: '#5', pipeline: 'Strong', trend: 'Stable', timestamp: 1721001600000,

                url: 'https://example.com/blog/linkedin-2024'

        const NOTIFICATIONS = [

            { id: 2, type: 'signal', title: 'Signal detected', body: 'Your LinkedIn content post has a keyword opportunity - no action taken yet.', time: 'Yesterday', icon: <Icon name="bolt" size={16} /> },
            { id: 3, type: 'publish', title: 'Published', body: '"SaaS onboarding email sequences" is now live and being tracked.', time: 'Nov 10, 2024', icon: <Icon name="check" size={16} /> }
        ];

        const MOCK_ARTICLE_CONTENT = {
            'Automated Follow-ups': [
                "Automated follow ups are the engine of B2B sales. Set them up once and let them run. Focus on timing and relevance.",
                "Send the first follow up exactly 24 hours after the initial touchpoint. Reference a specific feature they viewed. Keep the message under 50 words. End with a clear single call to action.",
                "Stop sending generic checking in emails. They kill pipeline. Buyers ignore messages that lack specific value. Base your triggers on product usage data. A user activating a premium feature needs a different sequence than a dormant trial user.",
                "Create three distinct paths for every campaign. Path one handles immediate engagement. Path two catches delayed interest. Path three recycles cold leads back into marketing nurturing.",

            ],
            'SaaS Onboarding Flow': [
                "A strong onboarding flow prevents churn before it starts. Guide the user to their core value realization within the first 5 minutes. Remove unnecessary steps. Celebrate small wins with contextual tooltips.",
                "Segment users based on their role. A developer needs different onboarding than a marketing lead. Trigger targeted emails based on in app behavior instead of simple time delays.",
                "Force users to complete the primary setup task immediately. Do not offer a skip button for critical path items. Show a progress bar that starts at twenty percent. This psychology trick increases completion rates.",

            ],
            'Email Metrics Tracking': [
                "Stop tracking vanity numbers. Open rates lie due to privacy protections. Click through rates and pipeline created are the only numbers that matter.",
                "Tie every campaign directly to closed won revenue. If a sequence drives clicks but no pipeline, rewrite the sequence. Build custom dashboards that sales leadership actually understands.",
                "Look at the conversion rate per step. Identify the exact email that causes prospects to unsubscribe. Rewrite that specific message or remove it entirely.",
                "Track reply rates for outbound sequences. A positive reply is the strongest signal of intent. Negative replies still provide valuable data. Tag reasons for rejection in your CRM.",
                "Group these objections to build better rebuttal campaigns. Focus on the total number of meetings booked per week. That is the ultimate indicator of campaign health."
            ],
            'CRM Integration Guides': [
                "Connect your email tool to your CRM immediately. Data silos kill deals. Map your custom fields correctly the first time to avoid data cleanup later.",
                "Bi directional syncing ensures sales and marketing look at the same truth. Set up clear rules for lead scoring and handoffs. Alert sales reps via Slack when a high intent lead clicks a pricing link.",
                "Audit your connection every quarter. Broken integrations waste marketing spend. Create a specific view for sales reps to see recent email activity. They need this context before picking up the phone.",
                "Standardize your naming conventions across both platforms. Do not let reps create custom fields without approval. Use hidden fields in forms to pass campaign data directly. This ensures accurate attribution.",
                "Train the sales team on how to read the timeline activity. Data is useless if the team ignores it."
            ],
            'A/B Testing Subject Lines': [
                "Test one variable at a time. Choose length, personalization, or urgency. Do not mix variables. A/B tests need statistical significance before you crown a winner.",
                "Do not make decisions based on a small sample size. Run tests for at least 48 hours. Apply winning formats to all future campaigns targeting that specific persona.",
                "Start with extreme differences. Test a short three word subject line against a highly descriptive sentence. Small tweaks rarely produce breakthrough results.",
                "Use clear numbers in your tests. See if odd numbers perform better than even numbers for your audience. Never test on your entire list at once. Send the test to a ten percent segment.",
                "Wait for the results. Push the winning variant to the remaining ninety percent. Document every test result in a shared team document. Stop repeating failed experiments."
            ]
        };

        const chartData = [
            { month: "Aug",  traffic: 1620 },
            { month: "Sep",  traffic: 1780 },
            { month: "Oct1", traffic: 1840 },
            { month: "Oct2", traffic: 1590 },
            { month: "Oct3", traffic: 1320 },
            { month: "Nov",  traffic: 1090 },
        ];

        const ChartTooltipContent = ({ active, payload }) => {
            if (active && payload && payload.length) {
                return (
                    <div className="bg-[#1A1A1E] border border-[#2A2A2E] rounded-[8px] px-3 py-2 shadow-xl">
                        <p className="font-sans text-[13px] text-[#F2F2F3]">{`${payload[0].value.toLocaleString()} visits`}</p>
                    </div>
                );
            }
            return null;
        };

        const Badge = ({ type, label }) => {
            const styles = {
                'Needs attention': { color: THEME.signals.attention, bg: `${THEME.signals.attention}26` },
                'On track': { color: THEME.signals.track, bg: `${THEME.signals.track}26` },
                'No data': { color: THEME.signals.none, bg: `${THEME.signals.none}26` },
                'Strong': { color: THEME.signals.track, bg: `${THEME.signals.track}26` },
                'Weak': { color: '#E1454D', bg: '#E1454D26' },
                'Moderate': { color: THEME.signals.moderate, bg: `${THEME.signals.moderate}26` },
                'No signal': { color: THEME.signals.none, border: `1px dashed ${THEME.border}` },
                'In progress': { color: THEME.signals.progress, bg: `${THEME.signals.progress}26` },
                'Draft': { color: THEME.text.tertiary, bg: `${THEME.border}` }
            };
            const style = styles[label] || styles['No data'];
            return (
                <div className="flex items-center gap-1.5 px-2.5 py-1 rounded-lg text-[11px] font-mono tracking-wider whitespace-nowrap" style={{ color: style.color, backgroundColor: style.bg, border: style.border }}>
                    <div className="w-1.5 h-1.5 rounded-full" style={{ backgroundColor: style.color }} />
                    {label}
                </div>
            );
        };

        const Button = ({ variant = 'primary', children, onClick, disabled, className = '' }) => {
            const base = "w-fit px-6 py-2.5 rounded-full text-sm font-medium transition-all duration-300 flex items-center justify-center gap-2 whitespace-nowrap";
            const variants = {
                primary: `bg-[#FC632B] text-white hover:opacity-90`,
                secondary: `border border-[#2A2A2E] text-[#F2F2F3] hover:bg-[#242428]`,
                ghost: `bg-transparent text-[#9B9BA4] hover:text-[#F2F2F3]`
            };
            return (
                <button onClick={onClick} disabled={disabled} className={`${base} ${variants[variant]} ${disabled ? 'opacity-40 cursor-not-allowed' : ''} ${className}`}>
                    {children}
                </button>
            );
        };

        const Spinner = () => (
            <svg className="animate-spin h-[16px] w-[16px] text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
        );

        const HlsVideoBackground = ({ src, className, style }) => {
            const videoRef = useRef(null);

            useEffect(() => {
                const video = videoRef.current;
                if (!video) return;

                video.defaultMuted = true;
                video.muted = true;

                if (window.Hls && window.Hls.isSupported()) {
                    const hls = new window.Hls();
                    hls.loadSource(src);
                    hls.attachMedia(video);
                    hls.on(window.Hls.Events.MANIFEST_PARSED, function() {
                        video.play().catch(e => console.log("Play failed:", e));
                    });
                    return () => {
                        hls.destroy();
                    };
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = src;
                    video.addEventListener('loadedmetadata', function() {
                        video.play().catch(e => console.log("Play failed:", e));
                    });
                }
            }, [src]);

            return (
                <video 
                    ref={videoRef}
                    autoPlay 
                    loop 
                    muted 
                    playsInline
                    className={className}
                    style={style}
                ></video>
            );
        };

        const LoginScreen = ({ onLogin }) => {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [emailError, setEmailError] = useState('');
            const [passwordError, setPasswordError] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [isExiting, setIsExiting] = useState(false);
            const videoRef = useRef(null);

            useEffect(() => {
                const video = videoRef.current;
                const videoSrc = "https://stream.mux.com/8wrHPCX2dC3msyYU9ObwqNdm00u3ViXvOSHUMRYSEe5Q.m3u8";
                
                if (video) {
                    video.defaultMuted = true;
                    video.muted = true;

                    if (window.Hls && window.Hls.isSupported()) {
                        const hls = new window.Hls();
                        hls.loadSource(videoSrc);
                        hls.attachMedia(video);
                        hls.on(window.Hls.Events.MANIFEST_PARSED, function() {
                            video.play().catch(e => console.log("Play failed:", e));
                        });
                        return () => {
                            hls.destroy();
                        };
                    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                        video.src = videoSrc;
                        video.addEventListener('loadedmetadata', function() {
                            video.play().catch(e => console.log("Play failed:", e));
                        });
                    }
                }
            }, []);

            const handleLogin = (e) => {
                e.preventDefault();
                setEmailError('');
                setPasswordError('');

                let hasError = false;

                if (!email) {
                    setEmailError('This field is required');
                    hasError = true;
                } else if (!email.includes('@')) {
                    setEmailError('Enter a valid work email');
                    hasError = true;
                }

                if (!password) {
                    setPasswordError('This field is required');
                    hasError = true;
                }

                if (hasError) return;

                setIsLoading(true);

                setTimeout(() => {
                    if (password === 'wrong') {
                        setPasswordError('Email or password is incorrect');
                        setIsLoading(false);
                    } else {
                        setIsExiting(true);
                        setTimeout(() => {
                            if (email === 'strategist@gmail.com') {
                                onLogin('signals');
                            } else if (email === 'writer@gmail.com') {
                                onLogin('produce');
                            } else {
                                onLogin('produce');
                            }
                        }, 300);
                    }
                }, 1000);
            };

            return (
                <div className="grid grid-cols-1 md:grid-cols-2 h-screen w-full bg-[#0E0E10] overflow-y-auto md:overflow-hidden font-sans">
                    <div className="relative h-[220px] md:h-full w-full overflow-hidden shrink-0">
                        <video 
                            ref={videoRef}
                            autoPlay 
                            loop 
                            muted 
                            playsInline
                            className="absolute inset-0 w-full h-full object-cover z-0"
                            style={{ transform: 'scale(1.25) translateX(-10%)', filter: 'sepia(100%) saturate(350%) hue-rotate(-35deg) brightness(80%) contrast(120%)' }}
                        ></video>

                        <div 
                            className="absolute inset-0 z-0 pointer-events-none opacity-[0.25] mix-blend-overlay"
                            style={{ backgroundImage: `url("data:image/svg+xml,%3Csvg viewBox='0 0 250 250' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='highResNoise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23highResNoise)'/%3E%3C/svg%3E")` }}
                        ></div>

                        <div 
                            className="absolute inset-0 z-10 pointer-events-none"
                            style={{ background: 'linear-gradient(to right, transparent 0%, transparent 40%, rgba(14,14,16,0.8) 80%, #0E0E10 100%)' }}
                        ></div>
                        
                        <div className="absolute top-[28px] left-[32px] font-heading text-[15px] font-medium text-[#F2F2F3] z-20">
                            Scribe AI
                        </div>

                        <div className="absolute bottom-[28px] left-[32px] flex flex-col gap-3 z-20">
                            <div className="flex items-center gap-3">
                                <div className="w-[20px] h-[1px] bg-[#FC632B]"></div>
                                <span className="font-mono text-[10px] uppercase text-[#FC632B] tracking-[0.12em]">Content intelligence</span>
                            </div>
                            <h2 className="font-heading text-[22px] font-medium text-[#F2F2F3] leading-[1.3] max-w-[260px]">
                                Performance data that produces decisions.
                            </h2>
                        </div>
                    </div>

                    <div className="flex items-center justify-center py-[40px] px-[24px] md:px-[48px] h-full flex-1">
                        <div className={`w-full max-w-[320px] flex flex-col transition-opacity duration-300 ease-in-out ${isExiting ? 'opacity-0' : 'animate-in fade-in'}`}>
                            
                            <h1 className="font-heading text-[26px] font-medium text-[#F2F2F3] tracking-[-0.01em]">Sign in</h1>
                            <p className="font-sans text-[13px] text-[#9B9BA4] mt-2">
                                No account? <a href="#" className="text-[#FC632B] font-medium hover:underline">Start free trial</a>
                            </p>

                            <form onSubmit={handleLogin} className="flex flex-col mt-8" noValidate>
                                <div className="mb-[12px] flex flex-col relative">
                                    <label htmlFor="email" className="font-mono text-[10px] uppercase text-[#6B6B72] tracking-[0.1em] mb-[6px]">
                                        Work email
                                    </label>
                                    <input 
                                        id="email"
                                        type="email" 
                                        value={email}
                                        onChange={(e) => setEmail(e.target.value)}
                                        aria-invalid={!!emailError}
                                        aria-describedby={emailError ? "email-error" : undefined}
                                        className={`w-full bg-[#242428] rounded-[8px] px-[12px] py-[10px] font-sans text-[13px] text-[#F2F2F3] placeholder:text-[#6B6B72] focus:outline-none transition-colors border ${emailError ? 'border-[#E1454D]' : 'border-[#2A2A2E] focus:border-[#FC632B]/50'}`}
                                        placeholder="name@company.com"
                                    />
                                    {emailError && (
                                        <div id="email-error" role="alert" className="text-[#E1454D] font-sans text-[11px] mt-1">
                                            {emailError}
                                        </div>
                                    )}
                                </div>

                                <div className="flex flex-col relative">
                                    <div className="flex justify-between items-baseline mb-[6px]">
                                        <label htmlFor="password" className="font-mono text-[10px] uppercase text-[#6B6B72] tracking-[0.1em]">
                                            Password
                                        </label>
                                        <a href="#" aria-label="Forgot your password" className="font-sans text-[11px] text-[#6B6B72] hover:text-[#9B9BA4] transition-colors">
                                            Forgot password?
                                        </a>
                                    </div>
                                    <input 
                                        id="password"
                                        type="password" 
                                        value={password}
                                        onChange={(e) => setPassword(e.target.value)}
                                        aria-invalid={!!passwordError}
                                        aria-describedby={passwordError ? "password-error" : undefined}
                                        className={`w-full bg-[#242428] rounded-[8px] px-[12px] py-[10px] font-sans text-[13px] text-[#F2F2F3] placeholder:text-[#6B6B72] focus:outline-none transition-colors border ${passwordError ? 'border-[#E1454D]' : 'border-[#2A2A2E] focus:border-[#FC632B]/50'}`}
                                    />
                                    {passwordError && (
                                        <div id="password-error" role="alert" className="text-[#E1454D] font-sans text-[11px] mt-1">
                                            {passwordError}
                                        </div>
                                    )}
                                </div>

                                <button 
                                    type="submit"
                                    disabled={isLoading}
                                    className="w-full bg-[#FC632B] text-white font-sans text-[14px] font-medium rounded-full py-[10px] px-[24px] hover:opacity-90 transition-opacity flex justify-center items-center gap-2 mt-[20px] disabled:opacity-70 disabled:cursor-not-allowed"
                                >
                                    {isLoading ? <Spinner /> : <>Sign in <Icon name="arrow_forward" size={16} /></>}
                                </button>
                            </form>

                            <div className="flex items-center gap-3 my-[16px]">
                                <div className="flex-1 h-px bg-[#2A2A2E]"></div>
                                <span className="font-mono text-[11px] uppercase text-[#6B6B72] tracking-[0.08em]">or</span>
                                <div className="flex-1 h-px bg-[#2A2A2E]"></div>
                            </div>

                            <button className="w-full bg-transparent border border-[#2A2A2E] text-[#F2F2F3] font-sans text-[13px] font-medium rounded-full py-[9px] px-[24px] hover:bg-[#242428] transition-colors flex justify-center items-center gap-2">
                                <div className="w-[14px] h-[14px] rounded-full border border-[#6B6B72]/50 shrink-0"></div>
                                Continue with SSO
                            </button>

                            <p className="font-sans text-[11px] text-[#6B6B72] text-center mt-[24px] leading-relaxed">
                                By signing in you agree to our <a href="#" className="underline underline-offset-[3px] hover:text-[#9B9BA4]">Terms</a> and <a href="#" className="underline underline-offset-[3px] hover:text-[#9B9BA4]">Privacy Policy</a>
                            </p>
                        </div>
                    </div>
                </div>
            );
        };

        const Layout = ({ children, activeTab, setRoute, toggleNotifications, hasUnread }) => (
            <div className="min-h-screen flex flex-col font-sans relative" style={{ backgroundColor: THEME.bg, color: THEME.text.primary }}>
                <nav className="h-16 border-b flex items-center justify-between px-4 md:px-8 sticky top-0 z-[100] bg-[#0E0E10]/95 backdrop-blur-md" style={{ borderColor: THEME.border }}>
                    <div className="flex items-center gap-2 cursor-pointer group" onClick={() => setRoute('produce')}>
                        <div className="w-6 h-6 bg-[#FC632B] rounded-md flex items-center justify-center group-hover:opacity-90 transition-opacity">
                            <div className="w-3 h-3 bg-white rotate-45 rounded-sm" />
                        </div>
                        <span className="font-heading text-lg font-medium tracking-tight hidden sm:inline text-[#F2F2F3] group-hover:text-white transition-colors">Scribe AI</span>
                    </div>

                    <div className="flex items-center gap-3 md:gap-4 relative z-[101]">
                        <button type="button" className="relative cursor-pointer flex items-center justify-center w-8 h-8 bg-transparent hover:bg-[#242428] rounded-lg border-none p-0 outline-none group focus:outline-none transition-colors" onClick={toggleNotifications}>
                            <Icon name="notifications" size={20} className="text-[#9B9BA4] group-hover:text-white transition-colors pointer-events-none" />
                            {hasUnread && <div className="absolute top-1.5 right-1.5 w-[8px] h-[8px] bg-red-500 rounded-full border border-[#0E0E10] pointer-events-none" />}
                        </button>
                        <button type="button" className="cursor-pointer flex items-center justify-center w-8 h-8 bg-transparent hover:bg-[#242428] rounded-lg border-none p-0 outline-none group focus:outline-none transition-colors" onClick={() => setRoute('settings')}>
                            <Icon name="settings" size={20} className="text-[#9B9BA4] group-hover:text-white transition-colors pointer-events-none" />
                        </button>
                        <button type="button"
                            className="w-7 h-7 md:w-8 md:h-8 rounded-full bg-[#242428] border border-[#2A2A2E] overflow-hidden cursor-pointer hover:border-[#FC632B]/50 transition-colors flex items-center justify-center p-0 outline-none focus:outline-none ml-1 shrink-0"
                            onClick={() => setRoute('login')}
                        >
                            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="avatar" className="w-full h-full object-cover pointer-events-none" />
                        </button>
                    </div>
                </nav>
                
                <main className="flex-1 w-full relative z-0">
                    {children}
                </main>
            </div>
        );

        const Settings = ({ role }) => {
            const [activeSection, setActiveSection] = useState('account');
            const [showToast, setShowToast] = useState(false);
            const [openMenu, setOpenMenu] = useState(null); // Integration options menu state
            
            // --- Default Form States ---
            const defaultAccount = { 
                name: role === 'strategist' ? 'Sarah K.' : 'Jamie D.', 
                email: role === 'strategist' ? 'sarah@company.com' : 'jamie@company.com' 
            };
            const defaultPassword = { current: '', new: '', confirm: '' };
            const defaultPrefs = { language: 'English', appearance: 'Dark' };
            const defaultWriterNotifs = { brief: true, published: true, signal: true };
            const defaultStrategistNotifs = { signal: true, brief: false, published: false, report: true };
            const defaultThresholds = { trafficDrop: '20', rankLoss: '3' };

            // --- Local States ---
            const [accountForm, setAccountForm] = useState(defaultAccount);
            const [passwordForm, setPasswordForm] = useState(defaultPassword);
            const [prefsForm, setPrefsForm] = useState(defaultPrefs);
            const [writerNotifs, setWriterNotifs] = useState(defaultWriterNotifs);
            const [strategistNotifs, setStrategistNotifs] = useState(defaultStrategistNotifs);
            const [thresholdsForm, setThresholdsForm] = useState(defaultThresholds);

            // --- Check if Active Section is Dirty ---
            const isAccountDirty = JSON.stringify(accountForm) !== JSON.stringify(defaultAccount) || passwordForm.current !== '' || passwordForm.new !== '' || passwordForm.confirm !== '';
            const isPrefsDirty = JSON.stringify(prefsForm) !== JSON.stringify(defaultPrefs);
            const isNotifsDirty = role === 'writer' ? JSON.stringify(writerNotifs) !== JSON.stringify(defaultWriterNotifs) : JSON.stringify(strategistNotifs) !== JSON.stringify(defaultStrategistNotifs);
            const isThresholdsDirty = JSON.stringify(thresholdsForm) !== JSON.stringify(defaultThresholds);

            useEffect(() => {
                let timer;
                if (showToast) {
                    timer = setTimeout(() => setShowToast(false), 4000);
                }
                return () => clearTimeout(timer);
            }, [showToast]);

            const handleSave = () => {
                setShowToast(true);
            };

            const NavItem = ({ id, label, badge }) => (
                <button
                    onClick={() => setActiveSection(id)}
                    className={`w-full text-left flex items-center justify-between px-[10px] py-[7px] rounded-[8px] transition-colors duration-150 ${
                        activeSection === id
                            ? 'bg-[#242428] text-[#F2F2F3] font-medium'
                            : 'text-[#9B9BA4] hover:bg-[#1A1A1E] hover:text-[#F2F2F3]'
                    }`}
                >
                    <span className="text-[14px] font-sans">{label}</span>
                    {badge && (
                        <span className="text-[10px] font-mono uppercase bg-[#56DAB0]/15 text-[#56DAB0] px-[7px] py-[2px] rounded-[100px] ml-[8px]">
                            {badge}
                        </span>
                    )}
                </button>
            );

            const InputField = ({ label, type, value, onChange }) => (
                <div className="flex flex-col gap-[6px] w-full">
                    <label className="text-[10px] font-mono text-[#6B6B72] uppercase tracking-[0.1em]">{label}</label>
                    <input type={type} value={value} onChange={onChange} className="bg-[#242428] border border-[#2A2A2E] rounded-[8px] px-[12px] py-[10px] text-[14px] text-[#F2F2F3] focus:outline-none focus:border-[#FC632B]/50 transition-colors w-full" />
                </div>
            );

            const ReadOnlyField = ({ label, value, badge }) => (
                <div className="flex flex-col gap-[6px] w-full">
                    <label className="text-[10px] font-mono text-[#6B6B72] uppercase tracking-[0.1em]">{label}</label>
                    <div className="bg-[#242428] border border-[#2A2A2E] rounded-[8px] px-[12px] py-[10px] text-[14px] text-[#6B6B72] flex justify-between items-center w-full min-h-[42px]">
                        {value}
                        {badge || <span className="text-[10px] font-mono text-[#6B6B72] uppercase tracking-[0.05em]">Read only</span>}
                    </div>
                </div>
            );

            const Toggle = ({ checked, onChange }) => (
                <button onClick={onChange} className={`w-[36px] h-[20px] rounded-full relative transition-colors duration-200 flex items-center px-[2px] shrink-0 ${checked ? 'bg-[#FC632B]' : 'bg-[#2A2A2E]'}`}>
                    <div className={`w-[16px] h-[16px] bg-white rounded-full transition-transform duration-200 ${checked ? 'translate-x-[16px]' : 'translate-x-0'}`} />
                </button>
            );

            const SaveDiscardRow = ({ onDiscard }) => (
                <div className="flex justify-end gap-[12px] mt-[32px] pt-[20px] border-t border-[#2A2A2E] animate-in fade-in">
                    <Button variant="secondary" onClick={onDiscard}>Discard changes</Button>
                    <Button variant="primary" onClick={handleSave}>Save changes</Button>
                </div>
            );

            return (
                <div className="w-full max-w-[1100px] mx-auto flex flex-col md:flex-row px-4 md:px-8 py-[40px] pb-[80px]">
                    
                    {/* LEFT COLUMN - NAV */}
                    <div className="w-full md:w-[240px] shrink-0 md:border-r border-[#2A2A2E] md:pr-[32px] flex flex-col min-h-[calc(100vh-200px)] mb-8 md:mb-0">
                        {/* Identity Row */}
                        <div className="flex items-center gap-[10px] mb-[28px]">
                            <div className="w-[28px] h-[28px] rounded-full bg-[#242428] border border-[#2A2A2E] flex items-center justify-center text-[12px] text-[#9B9BA4] font-medium shrink-0">
                                {role === 'strategist' ? 'S' : 'J'}
                            </div>
                            <div className="text-[13px] font-sans text-[#9B9BA4]">{role === 'strategist' ? 'sarah@company.com' : 'jamie@company.com'}</div>
                        </div>

                        {/* Group 1: PERSONAL */}
                        <div className="mb-[24px]">
                            <div className="flex items-center gap-[8px] mb-[4px]">
                                <Icon name="person" size={16} className="text-[#6B6B72]" />
                                <span className="text-[11px] font-mono uppercase text-[#6B6B72] tracking-[0.08em]">Personal</span>
                            </div>
                            <div className="flex flex-col gap-[4px]">
                                <NavItem id="account" label="My account" />
                                <NavItem id="preferences" label="Preferences" />
                                <NavItem id="notifications" label="Notifications" />
                                <NavItem id="integrations" label="Integrations" />
                            </div>
                        </div>

                        {/* Group 2: WORKSPACE */}
                        <div className="mb-[24px]">
                            <div className="flex items-center gap-[8px] mb-[4px]">
                                <Icon name="domain" size={16} className="text-[#6B6B72]" />
                                <span className="text-[11px] font-mono uppercase text-[#6B6B72] tracking-[0.08em]">Workspace</span>
                            </div>
                            <div className="flex flex-col gap-[4px]">
                                <NavItem id="teamspace" label="Teamspace" />
                                <NavItem id="plans" label="Plans" badge={role === 'writer' ? 'Free' : 'Growth'} />
                                {role === 'strategist' && (
                                    <>
                                        <NavItem id="billing" label="Billing" />
                                        <NavItem id="members" label="Members" />
                                        <NavItem id="thresholds" label="Signal thresholds" />
                                    </>
                                )}
                            </div>
                        </div>

                        {/* Logout */}
                        <div className="mt-auto pt-[24px] border-t border-[#2A2A2E]">
                            <button className="flex items-center gap-[8px] text-[14px] font-sans text-[#6B6B72] hover:text-[#FF4949] transition-colors w-full text-left">
                                <Icon name="logout" size={14} /> Logout
                            </button>
                        </div>
                    </div>

                    {/* RIGHT COLUMN - CONTENT */}
                    <div className="flex-1 md:pl-[56px] flex flex-col relative min-h-[500px]">
                        
                        {/* ACCOUNT SECTION */}
                        {activeSection === 'account' && (
                            <div className="animate-in fade-in flex flex-col h-full">
                                <div className="flex items-center gap-[16px] mb-[28px]">
                                    <div className="w-[56px] h-[56px] rounded-full bg-[#242428] border border-[#2A2A2E] overflow-hidden shrink-0">
                                        <img src={`https://api.dicebear.com/7.x/avataaars/svg?seed=${role === 'strategist' ? 'Felix' : 'Jamie'}`} alt="avatar" className="w-full h-full object-cover" />
                                    </div>
                                    <button className="text-[13px] font-sans font-medium text-[#9B9BA4] hover:text-[#F2F2F3] transition-colors">Update photo</button>
                                </div>

                                <div className="flex flex-col gap-[16px]">
                                    <InputField label="Full name" type="text" value={accountForm.name} onChange={(e) => setAccountForm({...accountForm, name: e.target.value})} />
                                    <InputField label="Email address" type="email" value={accountForm.email} onChange={(e) => setAccountForm({...accountForm, email: e.target.value})} />
                                    <ReadOnlyField label="Role" value={role === 'strategist' ? 'Strategist' : 'Writer'} />
                                </div>

                                {/* Password Fields (Always visible per request) */}
                                <div className="flex flex-col gap-[16px] mt-[32px]">
                                    <InputField label="Current password" type="password" value={passwordForm.current} onChange={(e) => setPasswordForm({...passwordForm, current: e.target.value})} />
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-[16px]">
                                        <InputField label="New password" type="password" value={passwordForm.new} onChange={(e) => setPasswordForm({...passwordForm, new: e.target.value})} />
                                        <InputField label="Confirm new password" type="password" value={passwordForm.confirm} onChange={(e) => setPasswordForm({...passwordForm, confirm: e.target.value})} />
                                    </div>
                                </div>

                                <div className="mt-auto">
                                    {isAccountDirty && (
                                        <SaveDiscardRow onDiscard={() => {
                                            setAccountForm(defaultAccount);
                                            setPasswordForm(defaultPassword);
                                        }} />
                                    )}
                                </div>
                            </div>
                        )}

                        {/* PREFERENCES SECTION */}
                        {activeSection === 'preferences' && (
                            <div className="animate-in fade-in flex flex-col h-full">
                                <div className="flex flex-col gap-[24px]">
                                    <div className="flex justify-between items-center">
                                        <div>
                                            <div className="text-[14px] font-sans font-medium text-[#F2F2F3]">Language</div>
                                            <div className="text-[12px] font-sans text-[#6B6B72] mt-[2px]">Choose your display language</div>
                                        </div>
                                        <div className="relative">
                                            <select 
                                                value={prefsForm.language}
                                                onChange={(e) => setPrefsForm({...prefsForm, language: e.target.value})}
                                                className="appearance-none bg-[#242428] border border-[#2A2A2E] rounded-[8px] py-[8px] pl-[12px] pr-[32px] text-[14px] font-sans text-[#F2F2F3] focus:outline-none focus:border-[#FC632B]/50 cursor-pointer"
                                            >
                                                <option value="English">English</option>
                                                <option value="Vietnamese">Vietnamese</option>
                                            </select>
                                            <Icon name="expand_more" size={16} className="absolute right-[8px] top-1/2 -translate-y-1/2 text-[#6B6B72] pointer-events-none" />
                                        </div>
                                    </div>

                                    <div className="flex justify-between items-center">
                                        <div>
                                            <div className="text-[14px] font-sans font-medium text-[#F2F2F3]">Appearance</div>
                                            <div className="text-[12px] font-sans text-[#6B6B72] mt-[2px]">Switch between dark and light mode</div>
                                        </div>
                                        <div className="bg-[#242428] border border-[#2A2A2E] rounded-[100px] p-[3px] flex items-center">
                                            <button 
                                                onClick={() => setPrefsForm({...prefsForm, appearance: 'Dark'})}
                                                className={`transition-colors rounded-[100px] px-[16px] py-[5px] text-[13px] font-sans ${prefsForm.appearance === 'Dark' ? 'bg-[#1A1A1E] text-[#F2F2F3] font-medium' : 'text-[#6B6B72] hover:text-[#9B9BA4]'}`}
                                            >Dark</button>
                                            <button 
                                                onClick={() => setPrefsForm({...prefsForm, appearance: 'Light'})}
                                                className={`transition-colors rounded-[100px] px-[16px] py-[5px] text-[13px] font-sans ${prefsForm.appearance === 'Light' ? 'bg-[#1A1A1E] text-[#F2F2F3] font-medium' : 'text-[#6B6B72] hover:text-[#9B9BA4]'}`}
                                            >Light</button>
                                        </div>
                                    </div>
                                </div>

                                <div className="mt-auto">
                                    {isPrefsDirty && <SaveDiscardRow onDiscard={() => setPrefsForm(defaultPrefs)} />}
                                </div>
                            </div>
                        )}

                        {/* NOTIFICATIONS SECTION */}
                        {activeSection === 'notifications' && (
                            <div className="animate-in fade-in flex flex-col h-full">
                                <div className="flex flex-col gap-[24px]">
                                    {role === 'writer' ? (
                                        <>
                                            <div className="flex justify-between items-center">
                                                <div>
                                                    <div className="text-[14px] font-sans font-medium text-[#F2F2F3]">Brief assigned</div>
                                                    <div className="text-[12px] font-sans text-[#6B6B72] mt-[2px]">When a strategist sends you a new brief</div>
                                                </div>
                                                <Toggle checked={writerNotifs.brief} onChange={() => setWriterNotifs({...writerNotifs, brief: !writerNotifs.brief})} />
                                            </div>
                                            <div className="flex justify-between items-center">
                                                <div>
                                                    <div className="text-[14px] font-sans font-medium text-[#F2F2F3]">Published confirmation</div>
                                                    <div className="text-[12px] font-sans text-[#6B6B72] mt-[2px]">When your post goes live and tracking starts</div>
                                                </div>
                                                <Toggle checked={writerNotifs.published} onChange={() => setWriterNotifs({...writerNotifs, published: !writerNotifs.published})} />
                                            </div>
                                            <div className="flex justify-between items-center">
                                                <div>
                                                    <div className="text-[14px] font-sans font-medium text-[#F2F2F3]">Signal on your posts</div>
                                                    <div className="text-[12px] font-sans text-[#6B6B72] mt-[2px]">When a post you wrote gets flagged</div>
                                                </div>
                                                <Toggle checked={writerNotifs.signal} onChange={() => setWriterNotifs({...writerNotifs, signal: !writerNotifs.signal})} />
                                            </div>
                                        </>
                                    ) : (
                                        <>
                                            <div className="flex justify-between items-center">
                                                <div>
                                                    <div className="text-[14px] font-sans font-medium text-[#F2F2F3]">Signal detected</div>
                                                    <div className="text-[12px] font-sans text-[#6B6B72] mt-[2px]">When any tracked post crosses a signal threshold</div>
                                                </div>
                                                <Toggle checked={strategistNotifs.signal} onChange={() => setStrategistNotifs({...strategistNotifs, signal: !strategistNotifs.signal})} />
                                            </div>
                                            <div className="flex justify-between items-center">
                                                <div>
                                                    <div className="text-[14px] font-sans font-medium text-[#F2F2F3]">Brief opened</div>
                                                    <div className="text-[12px] font-sans text-[#6B6B72] mt-[2px]">When a writer opens a brief you assigned</div>
                                                </div>
                                                <Toggle checked={strategistNotifs.brief} onChange={() => setStrategistNotifs({...strategistNotifs, brief: !strategistNotifs.brief})} />
                                            </div>
                                            <div className="flex justify-between items-center">
                                                <div>
                                                    <div className="text-[14px] font-sans font-medium text-[#F2F2F3]">Writer published</div>
                                                    <div className="text-[12px] font-sans text-[#6B6B72] mt-[2px]">When a writer publishes a piece</div>
                                                </div>
                                                <Toggle checked={strategistNotifs.published} onChange={() => setStrategistNotifs({...strategistNotifs, published: !strategistNotifs.published})} />
                                            </div>
                                            <div className="flex justify-between items-center">
                                                <div>
                                                    <div className="text-[14px] font-sans font-medium text-[#F2F2F3]">Report ready</div>
                                                    <div className="text-[12px] font-sans text-[#6B6B72] mt-[2px]">When a monthly report is auto-generated</div>
                                                </div>
                                                <Toggle checked={strategistNotifs.report} onChange={() => setStrategistNotifs({...strategistNotifs, report: !strategistNotifs.report})} />
                                            </div>
                                        </>
                                    )}
                                </div>
                                
                                <div className="mt-auto">
                                    {isNotifsDirty && <SaveDiscardRow onDiscard={() => role === 'writer' ? setWriterNotifs(defaultWriterNotifs) : setStrategistNotifs(defaultStrategistNotifs)} />}
                                </div>
                            </div>
                        )}

                        {/* INTEGRATIONS SECTION */}
                        {activeSection === 'integrations' && (
                            <div className="animate-in fade-in flex flex-col h-full">
                                <div className="text-[10px] font-mono text-[#6B6B72] uppercase tracking-[0.08em] mb-[10px]">Connected</div>
                                <div className="flex flex-col gap-[8px] mb-[24px]">
                                    {/* Google Analytics */}
                                    <div className="bg-[#1A1A1E] border border-[#2A2A2E] rounded-[12px] p-[16px] px-[20px] flex items-center justify-between hover:bg-[#242428] transition-colors">
                                        <div className="flex items-center gap-[16px]">
                                            <div className="w-[40px] h-[40px] rounded-[8px] bg-[#242428] flex items-center justify-center border border-[#2A2A2E]">
                                                <img src="https://www.vectorlogo.zone/logos/google_analytics/google_analytics-icon.svg" className="w-[20px] h-[20px]" alt="GA" />
                                            </div>
                                            <div>
                                                <div className="text-[#F2F2F3] font-sans font-medium text-[14px]">Google Analytics</div>
                                                <div className="text-[#6B6B72] font-sans text-[12px] mt-[2px]">workspace@company.com</div>
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-[12px] relative">
                                            <div className="text-[10px] font-mono uppercase bg-[#56DAB0]/15 text-[#56DAB0] px-[8px] py-[2px] rounded-[6px]">Active</div>

                                            {openMenu === 'ga' && (
                                                <div className="absolute right-0 top-[100%] mt-[4px] w-[140px] bg-[#242428] border border-[#2A2A2E] rounded-[8px] shadow-xl overflow-hidden z-10 py-[4px] animate-in fade-in">

                                                    <button onClick={() => setOpenMenu(null)} className="w-full text-left px-[12px] py-[8px] text-[13px] font-sans text-[#FF4949] hover:bg-[#1A1A1E] transition-colors focus:outline-none">Disconnect</button>

                                    </div>

                                    {/* Search Console */}
                                    <div className="bg-[#1A1A1E] border border-[#2A2A2E] rounded-[12px] p-[16px] px-[20px] flex items-center justify-between hover:bg-[#242428] transition-colors">
                                        <div className="flex items-center gap-[16px]">
                                            <div className="w-[40px] h-[40px] rounded-[8px] bg-[#242428] flex items-center justify-center border border-[#2A2A2E]">

                                            <div>

                                        </div>
                                        <div className="flex items-center gap-[12px] relative">
                                            <div className="text-[10px] font-mono uppercase bg-[#56DAB0]/15 text-[#56DAB0] px-[8px] py-[2px] rounded-[6px]">Active</div>
                                            <button onClick={() => setOpenMenu(openMenu === 'gsc' ? null : 'gsc')} className="p-[4px] rounded-[6px] text-[#6B6B72] hover:bg-[#242428] hover:text-[#F2F2F3] transition-colors focus:outline-none"><Icon name="more_horiz" size={20} /></button>
                                            
                                            {/* Action Menu */}
                                            {openMenu === 'gsc' && (
                                                <div className="absolute right-0 top-[100%] mt-[4px] w-[140px] bg-[#242428] border border-[#2A2A2E] rounded-[8px] shadow-xl overflow-hidden z-10 py-[4px] animate-in fade-in">
                                                    <button onClick={() => setOpenMenu(null)} className="w-full text-left px-[12px] py-[8px] text-[13px] font-sans text-[#F2F2F3] hover:bg-[#1A1A1E] transition-colors focus:outline-none">Edit settings</button>
                                                    <button onClick={() => setOpenMenu(null)} className="w-full text-left px-[12px] py-[8px] text-[13px] font-sans text-[#FF4949] hover:bg-[#1A1A1E] transition-colors focus:outline-none">Disconnect</button>

                                <div className="text-[10px] font-mono text-[#6B6B72] uppercase tracking-[0.08em] mb-[10px]">Not Connected</div>

                                    <div className="bg-[#1A1A1E] border border-[#2A2A2E] rounded-[12px] p-[16px] px-[20px] flex items-center justify-between hover:bg-[#242428] transition-colors">
                                        <div className="flex items-center gap-[16px]">
                                            <div className="w-[40px] h-[40px] rounded-[8px] bg-[#242428] flex items-center justify-center border border-[#2A2A2E]">

                                            </div>
                                            <div className="text-[#F2F2F3] font-sans font-medium text-[14px]">CRM</div>

                        {/* TEAMSPACE SECTION */}
                        {activeSection === 'teamspace' && (
                            <div className="animate-in fade-in flex flex-col h-full">

                                        </div>
                                    </div>
                                </div>
                                <p className="text-[13px] font-sans text-[#6B6B72]">To change workspace settings or manage billing, contact your admin.</p>

                        {/* PLANS SECTION */}
                        {activeSection === 'plans' && (
                            <div className="animate-in fade-in flex flex-col h-full">
