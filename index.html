                                        <div className="bg-[#242428] border border-[#2A2A2E] rounded-[8px] px-[12px] py-[10px] text-[14px] font-sans text-[#6B6B72] flex justify-between items-center w-full min-h-[42px]">
                                            {role === 'writer' ? 'Free plan' : 'Growth plan'}
                                            <span className="text-[10px] font-mono uppercase bg-[#56DAB0]/15 text-[#56DAB0] px-[8px] py-[2px] rounded-[6px]">Active</span>
                                        </div>
                                    </div>
                                    {role === 'strategist' && (
                                        <div className="flex flex-col gap-[6px] w-full">
                                            <label className="text-[10px] font-mono text-[#6B6B72] uppercase tracking-[0.1em]">Admin Contact</label>
                                            <div className="bg-[#242428] border border-[#2A2A2E] rounded-[8px] px-[12px] py-[10px] text-[14px] font-sans text-[#6B6B72] flex justify-between items-center w-full min-h-[42px]">
                                                admin@company.com
                                                <span className="text-[10px] font-mono text-[#6B6B72] uppercase tracking-[0.05em]">Read only</span>
                                            </div>
                                        </div>
                                    )}
                                </div>
                                <p className="text-[13px] font-sans text-[#6B6B72]">To upgrade or change your plan, contact your admin.</p>
                            </div>
                        )}

                        {/* BILLING SECTION */}
                        {activeSection === 'billing' && role === 'strategist' && (
                            <div className="animate-in fade-in flex flex-col h-full">
                                <div className="flex flex-col gap-[24px] mb-[32px]">
                                    <div className="flex justify-between items-center">
                                        <span className="text-[10px] font-mono text-[#6B6B72] uppercase tracking-[0.1em]">Billing cycle</span>
                                        <span className="text-[14px] font-sans text-[#F2F2F3]">Monthly</span>
                                    </div>
                                    <div className="flex justify-between items-center">
                                        <span className="text-[10px] font-mono text-[#6B6B72] uppercase tracking-[0.1em]">Next renewal</span>
                                        <span className="text-[14px] font-sans text-[#F2F2F3]">Dec 1, 2024</span>
                                    </div>
                                    <div className="flex justify-between items-center">
                                        <span className="text-[10px] font-mono text-[#6B6B72] uppercase tracking-[0.1em]">Payment method</span>
                                        <span className="text-[14px] font-sans text-[#F2F2F3]">Visa ending in 4242</span>
                                    </div>
                                    <div className="flex justify-between items-center">
                                        <span className="text-[10px] font-mono text-[#6B6B72] uppercase tracking-[0.1em]">Invoice email</span>
                                        <span className="text-[14px] font-sans text-[#F2F2F3]">billing@company.com</span>
                                    </div>
                                </div>
                                <p className="text-[13px] font-sans text-[#6B6B72]">To update billing details, contact your admin.</p>
                            </div>
                        )}

                        {/* MEMBERS SECTION */}
                        {activeSection === 'members' && role === 'strategist' && (
                            <div className="animate-in fade-in flex flex-col h-full">
                                <div className="flex flex-col mb-[32px]">
                                    {[
                                        { name: 'Jamie D.', role: 'Writer', initial: 'J' },
                                        { name: 'Alex T.', role: 'Writer', initial: 'A' },
                                        { name: 'Sarah K.', role: 'Strategist', initial: 'S' }
                                    ].map((member, i) => (
                                        <div key={member.name} className="flex justify-between items-center py-[16px]">
                                            <div className="flex items-center gap-[12px]">
                                                <div className="w-[32px] h-[32px] rounded-full bg-[#242428] border border-[#2A2A2E] flex items-center justify-center text-[12px] font-sans font-medium text-[#9B9BA4]">{member.initial}</div>
                                                <div className="text-[14px] font-sans font-medium text-[#F2F2F3]">{member.name}</div>
                                            </div>
                                            <span className="text-[10px] font-mono text-[#6B6B72] uppercase tracking-[0.08em]">{member.role}</span>
                                        </div>
                                    ))}
                                </div>
                                <p className="text-[13px] font-sans text-[#6B6B72]">To add or remove team members, contact your admin.</p>
                            </div>
                        )}

                        {/* SIGNAL THRESHOLDS SECTION */}
                        {activeSection === 'thresholds' && role === 'strategist' && (
                            <div className="animate-in fade-in flex flex-col h-full">
                                <div className="flex flex-col gap-[24px]">
                                    <div className="flex justify-between items-center">
                                        <div>
                                            <div className="text-[14px] font-sans font-medium text-[#F2F2F3]">Traffic drop</div>
                                            <div className="text-[12px] font-sans text-[#6B6B72] mt-[2px]">Flag when organic traffic falls significantly</div>
                                        </div>
                                        <div className="text-[13px] font-sans text-[#9B9BA4] flex items-center">
                                            Flag when traffic drops more than 
                                            <input type="text" value={thresholdsForm.trafficDrop} onChange={(e) => setThresholdsForm({...thresholdsForm, trafficDrop: e.target.value})} className="bg-[#242428] border border-[#2A2A2E] rounded-[8px] w-[52px] py-[6px] px-[10px] mx-[8px] text-center text-[14px] font-sans text-[#F2F2F3] focus:outline-none focus:border-[#FC632B]/50 transition-colors" /> 
                                            % over 30 days
                                        </div>
                                    </div>
                                    <div className="flex justify-between items-center">
                                        <div>
                                            <div className="text-[14px] font-sans font-medium text-[#F2F2F3]">Rank loss</div>
                                            <div className="text-[12px] font-sans text-[#6B6B72] mt-[2px]">Flag when search ranking falls</div>
                                        </div>
                                        <div className="text-[13px] font-sans text-[#9B9BA4] flex items-center">
                                            Flag when rank drops more than 
                                            <input type="text" value={thresholdsForm.rankLoss} onChange={(e) => setThresholdsForm({...thresholdsForm, rankLoss: e.target.value})} className="bg-[#242428] border border-[#2A2A2E] rounded-[8px] w-[52px] py-[6px] px-[10px] mx-[8px] text-center text-[14px] font-sans text-[#F2F2F3] focus:outline-none focus:border-[#FC632B]/50 transition-colors" /> 
                                            positions
                                        </div>
                                    </div>
                                </div>
                                <div className="mt-auto">
                                    {isThresholdsDirty && <SaveDiscardRow onDiscard={() => setThresholdsForm(defaultThresholds)} />}
                                </div>
                            </div>
                        )}

                    </div>
                </div>
            );
        };

        // --- MAIN APP COMPONENT ---

        function App() {
            const [route, setRoute] = useState('login'); 
            const [role, setRole] = useState('strategist');
            const [routeContext, setRouteContext] = useState(null);
            const [notificationsOpen, setNotificationsOpen] = useState(false);
            const [unread, setUnread] = useState(true);
            const [nestedArticle, setNestedArticle] = useState(null);
            const [selectedAction, setSelectedAction] = useState('refresh');
            const [isBriefSent, setIsBriefSent] = useState(false);
            const [showSignalToast, setShowSignalToast] = useState(false);
            const [briefNote, setBriefNote] = useState("Update the existing guide to include a dedicated section on AI-driven sequence personalization. Focus on reclaiming the featured snippet from EmailFlow.io by addressing the 'AI Automation' gap identified in our analysis.");
            const relatedScrollRef = useRef(null);

            useEffect(() => {
                let timer;
                if (showSignalToast) {
                    timer = setTimeout(() => {
                        setShowSignalToast(false);
                    }, 4000);
                }
                return () => clearTimeout(timer);
            }, [showSignalToast]);

            const getActiveTab = () => {
                if (['signals', 'detail', 'reports'].includes(route)) return 'signals';
                if (['produce', 'brief', 'editor'].includes(route)) return 'produce';
                return null; 
            };

            const activeTab = getActiveTab();

            const handleRouteChange = (newRoute, context = null) => {
                setRoute(newRoute);
                setRouteContext(context);
                setNotificationsOpen(false);
                setNestedArticle(null);
                setSelectedAction(newRoute === 'detail' ? 'refresh' : null);
                setIsBriefSent(false);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            if (route === 'login') {
                return <LoginScreen onLogin={(targetRoute) => {
                    if (targetRoute === 'signals') setRole('strategist');
                    else setRole('writer');
                    handleRouteChange(targetRoute);
                }} />;
            }

            return (
                <div className="min-h-screen">
                    <Layout 
                        activeTab={activeTab} 
                        setRoute={handleRouteChange} 
                        toggleNotifications={() => { setNotificationsOpen(!notificationsOpen); setUnread(false); }}
                        hasUnread={unread}
                    >
                        {route === 'signals' && <SignalsHome onPostDetail={() => handleRouteChange('detail')} onReports={() => handleRouteChange('reports')} />}
                        {route === 'produce' && <ProduceHome onOpenBrief={(source) => handleRouteChange('brief', { source })} />}
                        {route === 'settings' && <Settings role={role} />}
                        
                        {route === 'reports' && (
                            <ReportsHome 
                                onBack={() => handleRouteChange('signals')} 
                                onPostDetail={(id) => handleRouteChange('detail', { id })} 
                            />
                        )}
                        {route === 'detail' && (
                            <div className="max-w-6xl mx-auto animate-in fade-in pb-20">
                                <div className="flex justify-between items-start mb-8">
                                    <button onClick={() => handleRouteChange('signals')} className="text-[#6B6B72] flex items-center gap-1 hover:text-white transition-colors"><Icon name="chevron_left" size={18} /> Back to dashboard</button>
                                </div>
                                <div className="flex justify-between items-center mb-2">
                                    <h1 className="text-3xl font-heading text-[#F2F2F3]">B2B email strategy guide</h1>
                                    <a 
                                        href="#" 
                                        target="_blank" 
                                        className="text-sm font-medium text-[#9B9BA4] hover:text-[#FC632B] flex items-center gap-1.5 transition-colors shrink-0"
                                    >
                                        <Icon name="open_in_new" size={16} /> View post
                                    </a>
                                </div>
                                <p className="text-[#9B9BA4] mb-10">Detailed signal analysis for the last 30 days</p>
                                
                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-10 items-stretch">
                                    <div className="bg-[#1A1A1E] border border-[#2A2A2E] p-[24px] rounded-[16px] flex flex-col">
                                        <h3 className="font-mono text-[11px] text-[#6B6B72] uppercase tracking-[0.05em] mb-[20px]">Organic traffic - last 90 days</h3>
                                        <div className="w-full min-h-[220px]">
                                            <ResponsiveContainer width="100%" height={220}>
                                                <LineChart data={chartData} margin={{ top: 28, right: 12, bottom: 0, left: 0 }}>
                                                    <CartesianGrid vertical={false} stroke="#2A2A2E" strokeDasharray="4 4" />
                                                    <XAxis 
                                                        dataKey="month" 
                                                        tickLine={false} 
                                                        axisLine={false} 
                                                        tickMargin={10} 
                                                        tick={{ fill: "#6B6B72", fontSize: 11, fontFamily: "DM Mono" }}
                                                        tickFormatter={(value) => value.replace(/[0-9]/g, "")}
                                                    />
                                                    <ChartTooltip content={<ChartTooltipContent />} cursor={{ stroke: '#2A2A2E', strokeWidth: 1, strokeDasharray: '4 4' }} />
                                                    <ReferenceLine 
                                                        x="Oct2" 
                                                        stroke="#FF4949" 
                                                        strokeDasharray="3 3" 
                                                        strokeWidth={1.5}
                                                        label={{
                                                            value: "Competitor post published Oct 18",
                                                            position: "top",
                                                            fill: "#FF4949",
                                                            fontSize: 11,
                                                            fontFamily: "DM Sans",
                                                            dy: -8,
                                                        }}
                                                    />
                                                    <Line 
                                                        type="monotone" 
                                                        dataKey="traffic" 
                                                        stroke="#FC632B" 
                                                        strokeWidth={2.5} 
                                                        dot={false} 
                                                        activeDot={{ r: 5, fill: "#FC632B", stroke: "#0E0E10", strokeWidth: 2 }}
                                                    />
                                                </LineChart>
                                            </ResponsiveContainer>
                                        </div>
                                    </div>

                                    <div className="flex flex-col gap-6">
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="bg-[#242428] border border-[#2A2A2E] rounded-[12px] p-[20px] flex flex-col gap-[6px]">
                                                <div className="font-mono text-[10px] text-[#6B6B72] uppercase tracking-[0.05em]">Rank change</div>
                                                <div className="font-heading text-[22px] text-[#FF4949] font-medium leading-none">#4 &rarr; #9</div>
                                                <div className="font-sans text-[12px] text-[#9B9BA4]">Lost 5 positions in 3 weeks</div>
                                            </div>
                                            <div className="bg-[#242428] border border-[#2A2A2E] rounded-[12px] p-[20px] flex flex-col gap-[6px]">
                                                <div className="font-mono text-[10px] text-[#6B6B72] uppercase tracking-[0.05em]">Traffic this month</div>
                                                <div className="font-heading text-[22px] text-[#FF4949] font-medium leading-none">-41%</div>
                                                <div className="font-sans text-[12px] text-[#9B9BA4]">1,840 &rarr; 1,090 visits / month</div>
                                            </div>
                                        </div>
                                        <div className="bg-[#1A1A1E] border border-[#2A2A2E] p-[24px] rounded-[16px] flex-1">
                                            <div className="font-mono text-[10px] text-[#6B6B72] uppercase tracking-[0.05em] mb-[10px]">What changed</div>
                                            <p className="font-sans text-[13px] text-[#9B9BA4] leading-[1.7]">
                                                A competitor published a more detailed guide on October 18 targeting the same primary keyword. Their post covers AI writing tools and automation workflows - two topics this post does not address. Search intent has shifted and this post no longer fully matches it.
                                            </p>
                                        </div>
                                    </div>

                                    <div className="bg-[#4DCBFD]/10 border border-[#4DCBFD]/30 p-[24px] rounded-[16px] flex flex-col">
                                        <h3 className="font-heading text-xl mb-6 text-[#4DCBFD] flex items-center gap-2">
                                            <Icon name="lightbulb" size={24} /> AI Conclusion
                                        </h3>
                                        <div className="space-y-4 text-[15px] text-[#F2F2F3] leading-relaxed">
                                            <p>Your content has lost <span className="text-[#4DCBFD] font-medium">"Featured Snippet"</span> status for the primary keyword.</p>
                                            <p>Competitor <span className="text-white italic underline underline-offset-4 decoration-[#4DCBFD]/50">"EmailFlow.io"</span> updated their guide recently with a new section on AI automation.</p>
                                        </div>
                                    </div>
                                </div>

                                <div className="flex flex-col gap-[24px]">
                                    <h2 className="text-[20px] font-heading text-[#F2F2F3]">Action to take</h2>

                                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-[16px]">
                                        <div 
                                            className={`relative cursor-pointer transition-all duration-200 ease-in-out p-5 rounded-[12px] flex flex-col ${selectedAction === 'refresh' ? 'bg-[#242428] border-[1.5px] border-[#FC632B]' : 'bg-[#1A1A1E] border border-[#2A2A2E] hover:bg-[#242428]'}`}
                                            onClick={() => setSelectedAction(selectedAction === 'refresh' ? null : 'refresh')}
                                        >
                                            <div className="absolute top-4 right-4 bg-[#FC632B] text-white text-[10px] font-mono uppercase tracking-wider px-2 py-0.5 rounded-[8px]">Recommended</div>
                                            <div className="font-heading text-[16px] mb-2 text-[#F2F2F3]">Refresh</div>
                                            <p className="text-[13px] text-[#9B9BA4] font-sans mb-6">Update existing guide with AI automation section to close content gap.</p>
                                            <div className="flex flex-col mt-auto">
                                                <div className="flex items-center gap-1.5 text-[12px] font-sans font-medium text-[#56DAB0] mb-3">
                                                    <Icon name="check" size={14} /> Medium effort - High impact
                                                </div>
                                                <div className="flex flex-col gap-1 text-[12px]">
                                                    <span className="font-sans text-[#6B6B72]">Expected</span>
                                                    <span className="text-[#F2F2F3] font-sans">Recover position 4-6 within 60 days</span>
                                                </div>
                                            </div>
                                        </div>

                                        <div 
                                            className={`relative cursor-pointer transition-all duration-150 ease-in-out p-5 rounded-[12px] flex flex-col ${selectedAction === 'expand' ? 'bg-[#242428] border-[1.5px] border-[#FC632B]' : 'bg-[#1A1A1E] border border-[#2A2A2E] hover:bg-[#242428]'}`}
                                            onClick={() => setSelectedAction(selectedAction === 'expand' ? null : 'expand')}
                                        >
                                            {selectedAction === 'expand' && <div className="absolute top-4 right-4 text-[#FC632B]"><Icon name="check" size={16} /></div>}
                                            <div className="font-heading text-[16px] mb-2 text-[#F2F2F3]">Expand</div>
                                            <p className="text-[13px] text-[#9B9BA4] font-sans mb-6">Create a new cluster post specifically focused on AI tools for email marketing.</p>
                                            <div className="flex flex-col mt-auto">
                                                <div className="flex items-center gap-1.5 text-[12px] font-sans font-medium text-[#FFB349] mb-3">
                                                    Medium effort - Moderate impact
                                                </div>
                                                <div className="flex flex-col gap-1 text-[12px]">
                                                    <span className="font-sans text-[#6B6B72]">Expected</span>
                                                    <span className="text-[#F2F2F3] font-sans">Capture net-new long-tail traffic</span>
                                                </div>
                                            </div>
                                        </div>

                                        <div 
                                            className={`relative cursor-pointer transition-all duration-150 ease-in-out p-5 rounded-[12px] flex flex-col ${selectedAction === 'retire' ? 'bg-[#242428] border-[1.5px] border-[#FC632B]' : 'bg-[#1A1A1E] border border-[#2A2A2E] hover:bg-[#242428]'}`}
                                            onClick={() => setSelectedAction(selectedAction === 'retire' ? null : 'retire')}
                                        >
                                            {selectedAction === 'retire' && <div className="absolute top-4 right-4 text-[#FC632B]"><Icon name="check" size={16} /></div>}
                                            <div className="font-heading text-[16px] mb-2 text-[#F2F2F3]">Retire</div>
                                            <p className="text-[13px] text-[#9B9BA4] font-sans mb-6">Unpublish post and redirect URL to the main marketing hub.</p>
                                            <div className="flex flex-col mt-auto">
                                                <div className="flex items-center gap-1.5 text-[12px] font-sans font-medium text-[#E1454D] mb-3">
                                                    <Icon name="close" size={14} /> Low effort - Low impact
                                                </div>
                                                <div className="flex flex-col gap-1 text-[12px]">
                                                    <span className="font-sans text-[#6B6B72]">Expected</span>
                                                    <span className="text-[#F2F2F3] font-sans">Consolidate authority to hub page</span>
                                                </div>
                                            </div>
                                        </div>

                                        <div 
                                            className={`relative cursor-pointer transition-all duration-150 ease-in-out p-5 rounded-[12px] flex flex-col ${selectedAction === 'repurpose' ? 'bg-[#242428] border-[1.5px] border-[#FC632B]' : 'bg-[#1A1A1E] border border-[#2A2A2E] hover:bg-[#242428]'}`}
                                            onClick={() => setSelectedAction(selectedAction === 'repurpose' ? null : 'repurpose')}
                                        >
                                            {selectedAction === 'repurpose' && <div className="absolute top-4 right-4 text-[#FC632B]"><Icon name="check" size={16} /></div>}
                                            <div className="font-heading text-[16px] mb-2 text-[#F2F2F3]">Repurpose</div>
                                            <p className="text-[13px] text-[#9B9BA4] font-sans mb-6">Turn existing tips into a 5-part LinkedIn carousel series.</p>
                                            <div className="flex flex-col mt-auto">
                                                <div className="flex items-center gap-1.5 text-[12px] font-sans font-medium text-[#FFB349] mb-3">
                                                    High effort - Moderate impact
                                                </div>
                                                <div className="flex flex-col gap-1 text-[12px]">
                                                    <span className="font-sans text-[#6B6B72]">Expected</span>
                                                    <span className="text-[#F2F2F3] font-sans">Drive social engagement & traffic</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="flex flex-col gap-2 mt-2 animate-in fade-in duration-300">
                                        <label className="text-[12px] font-mono text-[#6B6B72] uppercase tracking-wider flex items-center gap-1.5">
                                            <Icon name="edit_note" size={16} /> Note for writer (optional)
                                        </label>
                                        <textarea 
                                            className="bg-[#1A1A1E] border border-[#2A2A2E] rounded-[12px] p-4 text-[#F2F2F3] text-[14px] focus:outline-none focus:border-[#FC632B]/50 transition-colors w-full resize-none min-h-[100px] font-sans"
                                            placeholder="Add specific instructions or context for the writer..."
                                            value={briefNote}
                                            onChange={(e) => setBriefNote(e.target.value)}
                                            disabled={!selectedAction || isBriefSent}
                                        />
                                    </div>

                                    <div className="mt-4">
                                        {isBriefSent ? (
                                            <div className="text-[14px] text-[#56DAB0] font-sans font-medium transition-all duration-250 ease-in-out flex items-center justify-end">
                                                <span>Brief sent to Jamie D. — this post is now marked as In progress.</span>
                                            </div>
                                        ) : (
                                            <div className="flex items-center justify-end">
                                                <div className="flex items-center gap-[16px]">
                                                    <Button 
                                                        variant="secondary"
                                                        onClick={() => {
                                                            setShowSignalToast(true);
                                                            handleRouteChange('signals');
                                                        }}
                                                    >
                                                        Dismiss signal
                                                    </Button>
                                                    <Button 
                                                        disabled={!selectedAction}
                                                        onClick={() => setIsBriefSent(true)}
                                                        className={`transition-all duration-200 ${!selectedAction ? 'opacity-40' : 'opacity-100'}`}
                                                    >
                                                        Send brief to Jamie D. &rarr;
                                                    </Button>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}
                        {route === 'brief' && (
                            <div className="w-full max-w-6xl mx-auto animate-in fade-in pb-20">
                                <button onClick={() => handleRouteChange('produce')} className="text-[#6B6B72] mb-8 flex items-center gap-1 hover:text-white transition-colors"><Icon name="chevron_left" size={18} /> Back</button>
                                <h1 className="text-3xl font-heading mb-8 text-[#F2F2F3]">Brief: B2B Email Strategy Refresh</h1>
                                
                                <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                                    <div className="lg:col-span-5 relative overflow-hidden flex flex-col">
                                        <div className="flex flex-col gap-8 flex-1">
                                            <div>
                                                <div className="text-[12px] font-sans font-medium text-[#6B6B72] uppercase tracking-wider mb-4">What worked</div>
                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 items-stretch">
                                                    <div className="bg-[#242428] border border-[#2A2A2E] rounded-[12px] p-4 flex flex-col gap-2 h-full">
                                                        <div className="flex items-center gap-2">
                                                            <Icon name="trending_up" size={16} className="text-[#56DAB0]" />
                                                            <span className="font-medium text-[14px] text-[#F2F2F3] font-sans">Top performing angle</span>
                                                        </div>
                                                        <p className="text-[14px] text-[#9B9BA4] font-sans leading-relaxed">Direct response copywriting examples significantly increased time-on-page.</p>
                                                        <div className="text-[12px] font-mono text-[#56DAB0] mt-auto pt-1">2.4x Higher Than Avg</div>
                                                    </div>
                                                    <div className="bg-[#242428] border border-[#2A2A2E] rounded-[12px] p-4 flex flex-col gap-2 h-full">
                                                        <div className="flex items-center gap-2">
                                                            <Icon name="my_location" size={16} className="text-[#56DAB0]" />
                                                            <span className="font-medium text-[14px] text-[#F2F2F3] font-sans">Audience engagement signal</span>
                                                        </div>
                                                        <p className="text-[14px] text-[#9B9BA4] font-sans leading-relaxed">Readers consistently clicked through to the advanced segmentation templates.</p>
                                                    </div>
                                                </div>
                                            </div>

                                            <div>
                                                <div className="text-[12px] font-sans font-medium text-[#6B6B72] uppercase tracking-wider mb-4">What to avoid</div>
                                                <div className="bg-[#242428] border border-[#2A2A2E] rounded-[12px] p-4 flex flex-col gap-2">
                                                    <div className="flex items-center gap-2">
                                                        <Icon name="warning" size={16} className="text-[#FFDE4D]" />
                                                        <span className="font-medium text-[14px] text-[#F2F2F3] font-sans">Drop-off pattern</span>
                                                    </div>
                                                    <p className="text-[14px] text-[#9B9BA4] font-sans leading-relaxed">High exit rates on generic tool feature lists. Keep focus on strategy implementation.</p>
                                                </div>
                                            </div>

                                            <div>
                                                <div className="text-[12px] font-sans font-medium text-[#6B6B72] uppercase tracking-wider mb-4">Suggested direction</div>
                                                <div className="bg-[#4DCBFD]/10 border border-[#4DCBFD]/30 rounded-[12px] p-5 flex flex-col gap-2">
                                                    <div className="flex items-center gap-2 text-[#4DCBFD] text-[15px] font-medium font-sans">
                                                        <Icon name="lightbulb" size={18} /> Recommended angle
                                                    </div>
                                                    <p className="text-[#F2F2F3] text-[15px] font-sans leading-relaxed">Double down on automated sequences triggered by product-led actions, backed by data.</p>
                                                </div>
                                            </div>

                                            <div className="mt-auto pt-4 overflow-hidden">
                                                <div className="flex items-center justify-between mb-4">
                                                    <div className="text-[12px] font-sans font-medium text-[#6B6B72] uppercase tracking-wider">Related pieces you've published</div>
                                                    <div className="flex items-center gap-1.5 shrink-0">
                                                        <button onClick={() => relatedScrollRef.current?.scrollBy({left: -200, behavior: 'smooth'})} className="w-[20px] h-[20px] flex items-center justify-center rounded-[4px] border border-[#2A2A2E] bg-transparent text-[#6B6B72] hover:text-[#F2F2F3] hover:bg-[#242428] transition-colors">
                                                            <Icon name="chevron_left" size={14} />
                                                        </button>
                                                        <button onClick={() => relatedScrollRef.current?.scrollBy({left: 200, behavior: 'smooth'})} className="w-[20px] h-[20px] flex items-center justify-center rounded-[4px] border border-[#2A2A2E] bg-transparent text-[#6B6B72] hover:text-[#F2F2F3] hover:bg-[#242428] transition-colors">
                                                            <Icon name="chevron_right" size={14} />
                                                        </button>
                                                    </div>
                                                </div>
                                                <div ref={relatedScrollRef} className="flex gap-3 overflow-x-auto no-scrollbar pb-2 scroll-smooth">
                                                    {['Automated Follow-ups', 'SaaS Onboarding Flow', 'Email Metrics Tracking', 'CRM Integration Guides', 'A/B Testing Subject Lines'].map(title => (
                                                        <button 
                                                            key={title} 
                                                            onClick={() => setNestedArticle(title)}
                                                            className="bg-[#242428] border border-[#2A2A2E] rounded-lg px-3 py-1.5 flex items-center gap-1.5 hover:border-[#FC632B]/50 transition-colors shrink-0"
                                                        >
                                                            <Icon name="description" size={14} className="text-[#6B6B72]" />
                                                            <span className="text-[12px] text-[#F2F2F3] font-sans whitespace-nowrap">{title}</span>
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>

                                        <div className={`absolute inset-0 bg-[#1A1A1E] z-10 p-8 sm:p-10 flex flex-col gap-4 transform transition-transform duration-350 ease-in-out ${nestedArticle ? 'translate-x-0' : 'translate-x-full'}`}>
                                            <button onClick={() => setNestedArticle(null)} className="flex items-center gap-1.5 text-sm font-medium text-[#9B9BA4] hover:text-[#F2F2F3] transition-colors w-fit mb-4 shrink-0">
                                                <Icon name="arrow_back" size={16} /> Back to brief
                                            </button>
                                            {nestedArticle && (
                                                <div className="flex flex-col flex-1 overflow-hidden">
                                                    <div className="text-[10px] font-mono text-[#6B6B72] uppercase mb-2 shrink-0">Read-only view</div>
                                                    <h3 className="text-[20px] font-heading text-[#F2F2F3] mb-8 leading-snug shrink-0">{nestedArticle}</h3>
                                                    <div className="space-y-6 max-w-2xl text-[15px] text-[#9B9BA4] font-sans leading-relaxed overflow-y-auto pr-4 pb-20 scrollbar-thin">
                                                        {MOCK_ARTICLE_CONTENT[nestedArticle]?.map((paragraph, index) => (
                                                            <p key={index}>{paragraph}</p>
                                                        )) || <p>Content not available.</p>}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    </div>

                                    <div className="lg:col-span-7 flex flex-col gap-6">
                                        <div className="bg-[#1A1A1E] border border-[#2A2A2E] p-8 rounded-2xl shadow-2xl flex flex-col gap-6 flex-1">
                                            <h2 className="text-[20px] font-heading text-[#F2F2F3]">Brief Details</h2>
                                            
                                            {routeContext?.source === 'ready_to_write' && (
                                                <div className="bg-[#242428]/50 border-l-2 border-[#6B6B72] p-5 rounded-r-xl mb-2">
                                                    <div className="flex items-center gap-2 mb-2">
                                                        <Icon name="person" size={14} className="text-[#9B9BA4]" />
                                                        <h3 className="text-[12px] font-mono text-[#9B9BA4] uppercase tracking-widest font-bold">Note from Sarah K.</h3>
                                                    </div>
                                                    <p className="text-[#F2F2F3] text-[14px] leading-relaxed">"{briefNote}"</p>
                                                </div>
                                            )}

                                            <div className="flex flex-col gap-2">
                                                <label className="text-[12px] font-mono text-[#6B6B72] uppercase tracking-wider">Primary Keyword</label>
                                                <input type="text" defaultValue="b2b email marketing" className="bg-[#242428] border border-[#2A2A2E] rounded-lg p-3 text-[#F2F2F3] text-sm focus:outline-none focus:border-[#FC632B]/50 transition-colors" />
                                            </div>

                                            <div className="flex flex-col gap-2">
                                                <label className="text-[12px] font-mono text-[#6B6B72] uppercase tracking-wider">Target Audience</label>
                                                <input type="text" defaultValue="Marketing Leads" className="bg-[#242428] border border-[#2A2A2E] rounded-lg p-3 text-[#F2F2F3] text-sm focus:outline-none focus:border-[#FC632B]/50 transition-colors" />
                                            </div>

                                            <div className="flex flex-col gap-2 flex-1">
                                                <label className="text-[12px] font-mono text-[#6B6B72] uppercase tracking-wider">Content Angle & Requirements</label>
                                                <textarea 
                                                    className="bg-[#242428] border border-[#2A2A2E] rounded-lg p-3 text-[#F2F2F3] text-sm focus:outline-none focus:border-[#FC632B]/50 transition-colors flex-1 resize-none min-h-[150px]" 
                                                    defaultValue="Direct response focus for high-ticket SaaS. Integrate specific real-world examples of sequences. Must explicitly mention integration with popular CRMs." 
                                                />
                                            </div>
                                            
                                            <Button onClick={() => handleRouteChange('editor')} className="py-4 mt-2">Start writing →</Button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                        {route === 'editor' && (
                            <EditorHome onBack={() => handleRouteChange('produce')} />
                        )}
                    </Layout>

                    <div 
                        className={`fixed inset-0 bg-black/60 z-[110] transition-opacity duration-300 ${notificationsOpen ? 'opacity-100 pointer-events-auto' : 'opacity-0 pointer-events-none'}`} 
                        onClick={() => setNotificationsOpen(false)}
                    />
                    <div className={`fixed inset-y-0 right-0 w-[320px] max-w-[90vw] bg-[#1A1A1E] border-l border-[#2A2A2E] z-[120] transform transition-transform duration-350 ease-in-out shadow-2xl ${notificationsOpen ? 'translate-x-0 pointer-events-auto' : 'translate-x-full pointer-events-none'}`}>
                        <div className="p-6 border-b border-[#2A2A2E] flex justify-between items-center bg-[#1A1A1E]/80 backdrop-blur-sm sticky top-0">
                            <h2 className="font-heading text-lg text-[#F2F2F3]">Notifications</h2>
                            <Icon name="close" size={20} className="text-[#6B6B72] cursor-pointer hover:text-[#F2F2F3] transition-colors" onClick={() => setNotificationsOpen(false)} />
                        </div>
                        <div className="p-4 space-y-3 overflow-y-auto max-h-[calc(100vh-80px)]">
                            {NOTIFICATIONS.map(n => (
                                <div key={n.id} className="p-4 rounded-xl bg-[#242428]/50 border border-[#2A2A2E] hover:border-[#FC632B]/50 hover:bg-[#242428] transition-all cursor-pointer group" onClick={() => handleRouteChange(n.type === 'brief' ? 'brief' : 'signals')}>
                                    <div className="flex gap-3 items-start">
                                        <div className="text-[#FC632B] mt-1 group-hover:scale-110 transition-transform">{n.icon}</div>
                                        <div>
                                            <div className="text-sm font-medium text-[#F2F2F3]">{n.title}</div>
                                            <p className="text-xs text-[#9B9BA4] mt-1 line-clamp-2 leading-relaxed">{n.body}</p>
                                            <div className="text-[10px] text-[#6B6B72] mt-3 font-mono uppercase tracking-widest">{n.time}</div>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {showSignalToast && ReactDOM.createPortal(
                        <div className="fixed bottom-8 left-1/2 -translate-x-1/2 z-[200] bg-[#242428] border border-[#2A2A2E] shadow-2xl rounded-full px-5 py-3 flex items-center gap-3 animate-in slide-in-from-bottom-5 duration-300">
                            <span className="text-sm text-[#F2F2F3] font-sans whitespace-nowrap">Signal dismissed</span>
                            <span className="text-[#6B6B72]">&middot;</span>
                            <button onClick={() => setShowSignalToast(false)} className="text-sm font-medium text-[#FC632B] hover:text-[#F2F2F3] transition-colors whitespace-nowrap focus:outline-none">Undo</button>
                        </div>,
                        document.body
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
