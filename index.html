<head>
    <meta charset="UTF-8">

    <!-- Fonts applied from Design System -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono&family=DM+Sans:ital,wght@0,400;0,500;1,400&family=Space+Grotesk:wght@500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

    <!-- Tailwind CSS for rapid styling matching the design tokens -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bg: '#0E0E10',
                        surface: '#1A1A1E',
                        surfaceHover: '#242428',
                        border: '#2A2A2E',
                        accent: '#FC632B',
                        textPrimary: '#F2F2F3',
                        textSecondary: '#9B9BA4',
                        textTertiary: '#6B6B72',
                        signalAttention: '#FF4949',
                        signalTrack: '#56DAB0',
                        signalModerate: '#FFB349',
                        signalProgress: '#7B8CDE',
                        systemError: '#E1454D',
                        systemWarning: '#FFDB4A',
                        systemSuccess: '#87F064',
                        systemInformative: '#4DCBFD'
                    },
                    fontFamily: {
                        heading: ['"Space Grotesk"', 'sans-serif'],
                        sans: ['"DM Sans"', 'sans-serif'],
                        mono: ['"DM Mono"', 'monospace'],
                    }
                }
            }
        }
    </script>

    <style>
        body { 
            background-color: #0E0E10; 
            color: #F2F2F3;
            margin: 0; 
            overflow-x: hidden;
            scrollbar-width: thin;
            scrollbar-color: #2A2A2E transparent;
        }
        
        body::-webkit-scrollbar { width: 8px; }
        body::-webkit-scrollbar-track { background: transparent; }
        body::-webkit-scrollbar-thumb { background: #2A2A2E; border-radius: 10px; }
        body::-webkit-scrollbar-thumb:hover { background: #FC632B; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .font-heading { font-family: 'Space Grotesk', sans-serif; letter-spacing: -0.01em; }
        .font-sans { font-family: 'DM Sans', sans-serif; line-height: 1.6; }
        .font-mono { font-family: 'DM Mono', monospace; line-height: 1.0; letter-spacing: 0.1em; text-transform: uppercase; }

        .animate-in { animation: fadeIn 500ms cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        html { scroll-behavior: smooth; }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        [contenteditable][data-placeholder]:empty:not(:focus)::before {
            content: attr(data-placeholder);
            color: #6B6B72;
            pointer-events: none;
            cursor: text;
        }

        /* Editor Prose Styles */
        .prose-editor { outline: none; }
        .prose-editor h1 { font-family: 'Space Grotesk', sans-serif; font-size: 32px; color: #F2F2F3; margin-bottom: 24px; margin-top: 0; font-weight: 500; letter-spacing: -0.01em; }
        .prose-editor h2 { font-family: 'Space Grotesk', sans-serif; font-size: 20px; color: #F2F2F3; margin-bottom: 16px; margin-top: 40px; font-weight: 500; letter-spacing: -0.01em; }
        .prose-editor p { color: #9B9BA4; font-size: 15px; line-height: 1.8; margin-bottom: 16px; margin-top: 0; min-height: 1.5em; }
        .prose-editor b, .prose-editor strong { color: #F2F2F3; font-weight: 600; }
        .prose-editor i, .prose-editor em { font-style: italic; }
        .prose-editor u { text-decoration: underline; text-decoration-color: #6B6B72; }
        .prose-editor ul { list-style-type: disc; padding-left: 24px; color: #9B9BA4; font-size: 15px; line-height: 1.8; margin-bottom: 16px; }
        .prose-editor ol { list-style-type: decimal; padding-left: 24px; color: #9B9BA4; font-size: 15px; line-height: 1.8; margin-bottom: 16px; }
        .prose-editor blockquote { border-left: 3px solid #FC632B; padding-left: 16px; margin-left: 0; color: #F2F2F3; font-style: italic; margin-bottom: 16px; }
        .prose-editor a { color: #4DCBFD; text-decoration: underline; }
        .prose-editor *:first-child { margin-top: 0; }
    </style>
</head>

                video.defaultMuted = true;
                video.muted = true;

                if (window.Hls && window.Hls.isSupported()) {

                    });
                    return () => {
                        hls.destroy();
                    };

                    video.addEventListener('loadedmetadata', function() {

                    });

                        <div className={`w-full max-w-[320px] flex flex-col transition-opacity duration-300 ease-in-out ${isExiting ? 'opacity-0' : 'animate-in fade-in'}`}>
                            <h1 className="font-heading text-[26px] font-medium text-[#F2F2F3] tracking-[-0.01em]">Sign in</h1>
                            <p className="font-sans text-[13px] text-[#9B9BA4] mt-2">
                                No account? <a href="#" className="text-[#FC632B] font-medium hover:underline">Start free trial</a>
                            </p>
                            <form onSubmit={handleLogin} className="flex flex-col mt-8" noValidate>
                                <div className="mb-[12px] flex flex-col relative">
                                    <label htmlFor="email" className="font-mono text-[10px] uppercase text-[#6B6B72] tracking-[0.1em] mb-[6px]">Work email</label>
                                    <input 
                                        id="email"
                                        type="email" 
                                        value={email}
                                        onChange={(e) => setEmail(e.target.value)}
                                        className={`w-full bg-[#242428] rounded-[8px] px-[12px] py-[10px] font-sans text-[13px] text-[#F2F2F3] placeholder:text-[#6B6B72] focus:outline-none transition-colors border ${emailError ? 'border-[#E1454D]' : 'border-[#2A2A2E] focus:border-[#FC632B]/50'}`}
                                        placeholder="name@company.com"
                                    />
                                    {emailError && <div className="text-[#E1454D] font-sans text-[11px] mt-1">{emailError}</div>}
                                </div>
                                <div className="flex flex-col relative">
                                    <div className="flex justify-between items-baseline mb-[6px]">
                                        <label htmlFor="password" className="font-mono text-[10px] uppercase text-[#6B6B72] tracking-[0.1em]">Password</label>
                                        <a href="#" className="font-sans text-[11px] text-[#6B6B72] hover:text-[#9B9BA4] transition-colors">Forgot password?</a>
                                    </div>
                                    <input 
                                        id="password"
                                        type="password" 
                                        value={password}
                                        onChange={(e) => setPassword(e.target.value)}
                                        className={`w-full bg-[#242428] rounded-[8px] px-[12px] py-[10px] font-sans text-[13px] text-[#F2F2F3] placeholder:text-[#6B6B72] focus:outline-none transition-colors border ${passwordError ? 'border-[#E1454D]' : 'border-[#2A2A2E] focus:border-[#FC632B]/50'}`}
                                    />
                                    {passwordError && <div className="text-[#E1454D] font-sans text-[11px] mt-1">{passwordError}</div>}
                                </div>
                                <button type="submit" disabled={isLoading} className="w-full bg-[#FC632B] text-white font-sans text-[14px] font-medium rounded-full py-[10px] px-[24px] hover:opacity-90 transition-opacity flex justify-center items-center gap-2 mt-[20px] disabled:opacity-70 disabled:cursor-not-allowed">
                                    {isLoading ? <Spinner /> : <>Sign in <Icon name="arrow_forward" size={16} /></>}
                                </button>
                            </form>
                            <div className="flex items-center gap-3 my-[16px]">
                                <div className="flex-1 h-px bg-[#2A2A2E]"></div>
                                <span className="font-mono text-[11px] uppercase text-[#6B6B72] tracking-[0.08em]">or</span>
                                <div className="flex-1 h-px bg-[#2A2A2E]"></div>
                            </div>
                            <button className="w-full bg-transparent border border-[#2A2A2E] text-[#F2F2F3] font-sans text-[13px] font-medium rounded-full py-[9px] px-[24px] hover:bg-[#242428] transition-colors flex justify-center items-center gap-2">
                                <div className="w-[14px] h-[14px] rounded-full border border-[#6B6B72]/50 shrink-0"></div>
                                Continue with SSO
                            </button>
                            <p className="font-sans text-[11px] text-[#6B6B72] text-center mt-[24px] leading-relaxed">
                                By signing in you agree to our <a href="#" className="underline underline-offset-[3px] hover:text-[#9B9BA4]">Terms</a> and <a href="#" className="underline underline-offset-[3px] hover:text-[#9B9BA4]">Privacy Policy</a>
                            </p>
                        </div>
                    </div>
                </div>
            );
        };

        // --- NAVIGATION SHELL ---
        const Layout = ({ children, activeTab, setRoute, toggleNotifications, hasUnread }) => (
            <div className="min-h-screen flex flex-col font-sans relative" style={{ backgroundColor: THEME.bg, color: THEME.text.primary }}>
                <nav className="h-16 border-b flex items-center justify-between px-4 md:px-8 sticky top-0 z-[100] bg-[#0E0E10]/95 backdrop-blur-md" style={{ borderColor: THEME.border }}>
                    <div className="flex items-center gap-2 cursor-pointer group" onClick={() => setRoute('produce')}>
                        <div className="w-6 h-6 bg-[#FC632B] rounded-md flex items-center justify-center group-hover:opacity-90 transition-opacity">
                            <div className="w-3 h-3 bg-white rotate-45 rounded-sm" />
                        </div>
                        <span className="font-heading text-lg font-medium tracking-tight hidden sm:inline text-[#F2F2F3] group-hover:text-white transition-colors">Scribe AI</span>
                    </div>

                    <div className="flex items-center gap-3 md:gap-4 relative z-[101]">
                        <button type="button" className="relative cursor-pointer flex items-center justify-center w-8 h-8 bg-transparent hover:bg-[#242428] rounded-lg border-none p-0 outline-none group focus:outline-none transition-colors" onClick={toggleNotifications}>
                            <Icon name="notifications" size={20} className="text-[#9B9BA4] group-hover:text-white transition-colors pointer-events-none" />
                            {hasUnread && <div className="absolute top-1.5 right-1.5 w-[8px] h-[8px] bg-red-500 rounded-full border border-[#0E0E10] pointer-events-none" />}
                        </button>
                        <button type="button" className="cursor-pointer flex items-center justify-center w-8 h-8 bg-transparent hover:bg-[#242428] rounded-lg border-none p-0 outline-none group focus:outline-none transition-colors" onClick={() => setRoute('settings')}>
                            <Icon name="settings" size={20} className="text-[#9B9BA4] group-hover:text-white transition-colors pointer-events-none" />
                        </button>
                        <button type="button"
                            className="w-7 h-7 md:w-8 md:h-8 rounded-full bg-[#242428] border border-[#2A2A2E] overflow-hidden cursor-pointer hover:border-[#FC632B]/50 transition-colors flex items-center justify-center p-0 outline-none focus:outline-none ml-1 shrink-0"
                            onClick={() => setRoute('login')}
                        >
                            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="avatar" className="w-full h-full object-cover pointer-events-none" />
                        </button>
                    </div>
                </nav>
                <main className="flex-1 w-full max-w-7xl mx-auto p-4 md:p-8 relative z-0">
                    {children}
                </main>
            </div>
        );

        // --- CONTENT CARD ---
        const ContentCard = ({ card, onClick }) => {
            const [part1, part2] = card.caption.split(' · ');
            return (
                <div 
                    className="p-5 rounded-xl bg-[#1A1A1E] border border-[#2A2A2E] hover:bg-[#242428] hover:border-[#FC632B]/50 transition-all cursor-pointer flex flex-col group min-h-[110px] h-full"
                    onClick={() => onClick(card)}
                >
                    <div className="flex justify-between items-start gap-2">
                        <Badge label={card.badge} />
                        <span className="text-[10px] font-mono text-[#6B6B72] whitespace-nowrap">{card.published}</span>
                    </div>
                    <h3 className="font-heading font-medium text-[15px] line-clamp-2 leading-snug text-[#F2F2F3] mt-3">
                        {card.title}
                    </h3>
                    <div className="w-full h-px bg-[#2A2A2E] mt-4 mb-3"></div>
                    <div className="flex flex-col gap-2 mt-auto">
                        <div className="flex items-center gap-1.5 text-[13px] text-[#F2F2F3] font-sans">
                            <Icon name="bar_chart" size={14} className="text-[#6B6B72] shrink-0" />
                            <span className="truncate">{part1}</span>
                        </div>
                        {part2 && (
                            <div className="flex items-center gap-1.5 text-[13px] text-[#F2F2F3] font-sans">
                                <Icon name="lightbulb" size={14} className="text-[#6B6B72] shrink-0" />
                                <span className="truncate">{part2}</span>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const ProduceHome = ({ onOpenBrief }) => {
            const [selectedCard, setSelectedCard] = useState(null);
            const [filter, setFilter] = useState('all');
            const [sortOrder, setSortOrder] = useState('newest');
            const [showToast, setShowToast] = useState(false);
            const [dismissedCard, setDismissedCard] = useState(null);

            useEffect(() => {
                let timer;
                if (showToast) {
                    timer = setTimeout(() => { setShowToast(false); setDismissedCard(null); }, 4000);
                }
                return () => clearTimeout(timer);
            }, [showToast]);

            const handleDismiss = (card) => {
                setDismissedCard(card);
                setSelectedCard(null);
                setShowToast(true);
            };

            const handleUndo = () => {
                setShowToast(false);
                setSelectedCard(dismissedCard);
                setDismissedCard(null);
            };

            useEffect(() => {
                if (selectedCard) document.body.style.overflow = 'hidden';
                else document.body.style.overflow = 'unset';
                return () => { document.body.style.overflow = 'unset'; };
            }, [selectedCard]);

            const getCount = (badgeType) => {
                if (badgeType === 'all') return CONTENT_CARDS.length;
                return CONTENT_CARDS.filter(card => card.badge.toLowerCase() === badgeType.toLowerCase()).length;
            };

            const filteredCards = CONTENT_CARDS
                .filter(card => filter === 'all' ? true : card.badge.toLowerCase() === filter.toLowerCase())
                .sort((a, b) => sortOrder === 'newest' ? b.timestamp - a.timestamp : a.timestamp - b.timestamp);

            const filters = [
                { id: 'all', label: 'All' },
                { id: 'needs attention', label: 'Needs attention' },
                { id: 'on track', label: 'On track' },
                { id: 'no data', label: 'No data' },
                { id: 'draft', label: 'Draft' }
            ];

            return (
                <div className="animate-in fade-in duration-500 pb-20 relative">
                    <div className="relative z-0 w-[100vw] left-[50%] right-[50%] -ml-[50vw] -mr-[50vw] h-[280px] -mt-4 md:-mt-8 mb-10 flex flex-col items-center justify-center text-center overflow-hidden bg-[#0E0E10]">
                        <HlsVideoBackground 
                            src="https://stream.mux.com/NcU3HlHeF7CUL86azTTzpy3Tlb00d6iF3BmCdFslMJYM.m3u8"
                            className="absolute inset-0 w-full h-full object-cover opacity-[0.65] z-0"
                            style={{ filter: 'contrast(120%) brightness(45%)' }}
                        />
                        <div className="absolute inset-0 z-0 pointer-events-none opacity-[0.35] mix-blend-overlay" style={{ backgroundImage: `url("data:image/svg+xml,%3Csvg viewBox='0 0 250 250' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='highResNoise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23highResNoise)'/%3E%3C/svg%3E")` }}></div>
                        <div className="absolute inset-0 z-0 pointer-events-none" style={{ background: 'linear-gradient(to top, #0E0E10 0%, transparent 25%)' }}></div>
                        <div className="relative z-10 px-4 mt-6">
                            <h1 className="text-[32px] md:text-[40px] font-heading text-[#F2F2F3] mb-3">Welcome back, Alice!</h1>
                            <p className="text-[15px] md:text-[16px] font-sans text-[#9B9BA4]">Start taking actions that reflect on your performance</p>
                        </div>
                    </div>

                    <div className="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-10">
                        <h1 className="text-3xl font-heading text-[#F2F2F3]">Production</h1>
                        <Button onClick={() => onOpenBrief('new')}>
                            <Icon name="add" size={18} /> Create new
                        </Button>
                    </div>

                    <div className="mb-10">
                        <h2 className="text-xl font-heading mb-4 text-[#F2F2F3]">Briefs ready to write</h2>
                        <div className="bg-[#1A1A1E] border border-[#2A2A2E] p-5 rounded-xl flex items-center justify-between cursor-pointer hover:bg-[#242428] transition-all group" onClick={() => onOpenBrief('ready_to_write')}>
                            <div className="flex items-center gap-5">
                                <div className="w-12 h-12 bg-[#FC632B]/10 rounded-xl flex items-center justify-center text-[#FC632B] group-hover:scale-105 transition-transform"><Icon name="description" size={24} /></div>
                                <div>
                                    <h3 className="font-medium text-[#F2F2F3]">Refresh - B2B email strategy guide</h3>
                                    <p className="text-xs text-[#6B6B72] mt-1">Assigned by Sarah K. • Due Nov 22</p>
                                </div>
                            </div>
                            <div className="flex items-center gap-2 text-[#FC632B] font-medium text-sm">Open brief <Icon name="chevron_right" size={16} /></div>
                        </div>
                    </div>

                    <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6 border-b border-[#2A2A2E] pb-4">
                        <div className="flex items-center gap-2 overflow-x-auto no-scrollbar">
                            {filters.map(f => (
                                <button key={f.id} onClick={() => setFilter(f.id)} className={`px-4 py-1.5 rounded-full text-xs font-medium transition-all whitespace-nowrap flex items-center gap-2 group ${filter === f.id ? 'bg-[#242428] text-[#F2F2F3]' : 'text-[#6B6B72] hover:text-[#F2F2F3]'}`}>
                                    {f.label}
                                    <span className={`px-1.5 py-0.5 rounded-md text-[10px] font-mono transition-colors ${filter === f.id ? 'bg-[#FC632B] text-white' : 'bg-[#2A2A2E] text-[#6B6B72] group-hover:text-[#9B9BA4]'}`}>{getCount(f.id)}</span>
                                </button>
                            ))}
                        </div>
                        <button onClick={() => setSortOrder(sortOrder === 'newest' ? 'oldest' : 'newest')} className="flex items-center gap-2 text-xs font-mono text-[#6B6B72] hover:text-[#F2F2F3] transition-colors">
                            <Icon name="swap_vert" size={16} /> SORT: {sortOrder.toUpperCase()}
                        </button>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                        {filteredCards.map(card => <ContentCard key={card.id} card={card} onClick={(c) => setSelectedCard(c)} />)}
                    </div>

                    {selectedCard && ReactDOM.createPortal(
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 sm:p-6 overflow-hidden">
                            <div className="absolute inset-0 bg-black/60 backdrop-blur-sm transition-opacity" onClick={() => setSelectedCard(null)}></div>
                            <div className="bg-[#1A1A1E] border border-[#2A2A2E] rounded-2xl w-full max-w-2xl z-10 animate-in fade-in zoom-in-95 duration-200 overflow-hidden flex flex-col shadow-2xl">
                                <div className="p-6 border-b border-[#2A2A2E] flex justify-between items-start bg-[#1A1A1E]">
                                    <div>
                                        <div className="w-fit"><Badge label={selectedCard.badge} /></div>
                                        <h2 className="text-xl sm:text-2xl font-heading text-[#F2F2F3] mt-4">{selectedCard.title}</h2>
                                        <div className="text-xs font-mono text-[#6B6B72] mt-2">PUBLISHED: {selectedCard.published}</div>
                                    </div>
                                    <button onClick={() => setSelectedCard(null)} className="text-[#6B6B72] hover:text-[#F2F2F3] transition-colors p-1"><Icon name="close" size={24} /></button>
                                </div>
                                <div className="p-6 flex flex-col gap-6 overflow-hidden">
                                    <div className="grid grid-cols-2 gap-6 p-5 rounded-xl bg-[#242428]/40 border border-[#2A2A2E]">
                                        <div className="flex flex-col gap-2">
                                            <div className="flex items-center gap-1.5 text-[#6B6B72]"><Icon name="subject" size={16} /> <span className="text-xs font-mono uppercase tracking-wider">Topic</span></div>
                                            <div className="text-sm text-[#F2F2F3] font-medium leading-snug">{selectedCard.angle}</div>
                                        </div>
                                        <div className="flex flex-col gap-2">
                                            <div className="flex items-center gap-1.5 text-[#6B6B72]"><Icon name="key" size={16} /> <span className="text-xs font-mono uppercase tracking-wider">Keyword</span></div>
                                            <div className="text-sm text-[#F2F2F3] font-medium leading-snug">{selectedCard.keyword}</div>
                                        </div>
                                        <div className="flex flex-col gap-2">
                                            <div className="flex items-center gap-1.5 text-[#6B6B72]"><Icon name="group" size={16} /> <span className="text-xs font-mono uppercase tracking-wider">Audience</span></div>
                                            <div className="text-sm text-[#F2F2F3] font-medium leading-snug
